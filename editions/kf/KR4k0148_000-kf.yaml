韓王力言亂事已勢大起來請他具文到清國求救韓王當時亦以袁世凱之言爲是因朝鮮人心以己國久爲中國藩屬心中還依靠中國卻不大喜歡日人的所以韓王聽了袁世凱的話如夢初覺立即與袁世凱商量表文裏頭的話即刻繕就了星夜派人前往天津先見了李鴻章然後入京謁見各大員商請發兵之事當下李相知道韓王求救果然朝鮮有亂是實但此番派兵勢不難與日人生出事來眼見陸軍不是他人敵手且北洋雖有水師奈經手訓練北洋水師的是英國藍提督又已辭差回國故此想到萬一與日人開仗太無把握因此甚不願戰惟廷旨已迫促派兵只得與軍機中人酌議一面派兵赴韓一面照會日人告以派兵之事便令直隸提督葉志超先帶淮軍一千五百人遵依天津條約令吐軍在牙山駐紮又派水師濟遠揚威二艦赴仁川以爲聲援時日人亦已派兵五千駐紮韓境不想朝鮮東學黨人當初雖甚聲勢及見清日兩國大軍雲集早已斂迹故亂早已平靖了論起當時清日各自派兵原屬各有道理因清國以爲藩屬有亂不得不派兵相助在日本又以天津條約是訂明自後朝鮮有事兩國共同干涉的他如何不派兵呢及至韓亂既平日本政府便照請清國同去干涉朝鮮內政那時袁世凱亦有電至李相處贊成此事偏又朝鮮王因日人派兵大多聲言要干涉己國政事便憂懼起來又電請清國先行撤兵以謝日人清廷亦曾有電問李鴻章如何辦法奈當時樞臣統通以朝鮮系自己屬國如何任日人干涉也總不記得天津條約的事那李鴻章無可如何便不能依從袁世凱贊成干涉韓政之電只得與日人商議並行撤兵那時日人以爲若不整妥韓政恐他不免複亂故此又不允即行撤兵之議李鴻章此時已懼戰禍不免只得又派總兵衛汝貴帶領盛軍馬步六營前往駐紮平壤又令馬玉昆領毅軍二千人駐紮義州一面仍與日人商議一同撤兵不料日人實守干涉韓政的主意幾番交涉撤兵之議總不肯從外面雖與清國會議實則陸續派兵往韓境已有萬餘人時清國駐韓兵力不過數千又不及日兵的慣練所以日人一發輕視清兵竟在牙山地方因點事兩國就衝突起來遂開了戰釁看官那李鴻章豈不知道自己內情實不輕易戰的故他心上本不主戰若依袁世凱的電贊成干涉韓政的事自然免了戰禍就是日人不允撤兵時肯遷就些還好奈當時朝中大臣總不通外情只當自己是個大國小覰了日本湊著光緒帝又是個少年氣盛的把個戰字看得容易故李鴻章亦無可如何這卻怪他不得但後來單靠與日人商議撤兵任日人派兵到萬餘人自己只派了數千可就失算了話休煩絮且說自日兵派到萬余人袁世凱整整打了幾通電報告知李相不料那李相總未得接你道什麽原故因李鴻章自從懼與日本失和已令龔照璵前往鎮守旅順又致囑張佩綸認真司理電報機關以爲派了自己人自然靠得住不提防那張佩綸自從在福州敗了仗回來聽見一個戰字已幾乎嚇破了膽總不願與日人開戰故接得袁世凱的電報統通譯出來先看知道日人已派出萬來兵誠恐李相見了一定加派人馬豈不是弄成了戰事左思右想要設一點法子好阻止李相派兵便將袁世凱的電報統通改易了李鴻章全不知覺遂滿意以爲日人可以和平了結後來打成仗才知道自己前敵兵少一經交鋒就失了牙山心中正恨袁世凱不把軍情報告又篤責葉志超無用那葉志超是個圖功怕罪的人眼見衆寡已是不敵槍械又不若他人之精料然抵敵不住惟有虛報了幾回勝仗再不敢戀戰直望風而走不分晝夜沒命的奔逃沿途並不敢有一刻駐紮直走到鳳凰城方行歇馬時提督宋慶正駐守鳳凰城見了葉志超大驚道我只道你在牙山打仗方才報了得勝爲何便到此地葉志超好半晌方神色稍定然後答道日兵好不厲害斷不能與他對敵的倘要戀戰不過在送了軍人性命宋慶厲聲道你可知道牙山到這裏有多少路程你報了勝仗又至今有幾多天這會便到此地想你路上不曾歇過馬莫不是你跑路總不見勞乏的葉志超惟有面紅不語宋慶道你既然敵日人不過就不該亂報勝仗致貪功誤事葉志超總沒一句話答時聽得日兵聲勢日大左保貴已在平壤戰歿了衛汝貴又不敢與日人對敵所以陸路各軍眼見是不濟那時日人又從水路進攻先把旅順攻破了原來龔道照璵駐守旅順從前所有修炮臺置大炮統通是中飽入自己私囊置了些沒用的東西就花開了數目盡私肥了數十萬金當日人未攻旅順之時李鴻章料得日人必來攻擊旅順就自己親往巡視炮臺看見一些東西皆不足應敵真是無名火起三千丈乘著怒氣舉起一只右手向龔照璵背項給了一巴掌龔照璵也不敢做聲所以世人說一巴掌就賺得數十萬就是這個原故話休煩絮且說是時日人既破了旅順又在黃海戰過一次只有一個致遠船管駕的鄧世昌拼命與日人一搏雖然壞了日人一二號戰艦致遠亦沈鄧世昌已殉難而死余外如濟遠管駕方伯謙更不消提只聞了炮聲就將船駛回退走日人艦隊就長驅直進盡力攻打劉公島時海軍提督丁汝昌料知不敵只得豎起白旗投降所以當時北洋艦隊除了沈沒的已盡數讓歸日人了那時無可奈何惟有向日本求和整整賠了二萬萬兩割了臺灣一省方才了事這都是人人知得的也不勞細表單表袁世凱在朝鮮自從清日兩國開了仗已把日本軍情凡自己探得的已統通電知李相不想張佩綸于袁世凱發來的電報盡行塗改了然後呈送李相閱看所以手相就深恨袁世凱謂他報告不實大誤軍情又因袁世凱是自己所用的卻不曾奏參即先發一道電文責備袁世凱都是責他不能探悉軍情妄報之意袁世凱得了李相那道電文心中大不滿意因爲自己已是盡情報告他竟反責下來究竟什麽原故想了想料知是電局的人作弊惟只道是朝鮮電局或有袒日黨人在其中把自己電文竄改去了殊不料倒是張佩綸作弄若僅打電回復李相恐電文又不難被人塗改這樣自己若不能親自見李相面陳斷斷難達得自己衷曲這時便立要回返天津去但當時正在兩國交兵自己是個駐韓辦事人員一定被日兵搜截如何去得惟事情重大又不容不去左思右想要尋個回國的法子便與署內幕員商議惟有改裝微行之一法次日便剃去兩撇鬍子扮作一個尋常的人帶了些少行李離了朝鮮沿途卻有日兵盤詰但都當他是個商人卻不好留難經了幾次險阻才脫出了附搭了一隻商船直望天津而去時己國又無商船來往日船又不便附搭只搭了一隻外國商船連船票也不曾寫定就跑到船上見著一間房子就端進去時日人恐怕泄漏自己軍情泊船處本來搜得十分嚴密還虧袁世凱扮成一個尋常商人不曾被他窺出破綻惟心上仍自打戰直待船已開行方敢跑出船房一步直望天津而來正是河橋馬渡人先去函穀雞鳴客已逃要知袁世凱回國如何情形且聽下回分解第五回改電文革員遭重譴練軍營袁道拜私恩話說袁世凱改裝附輪之後直抵天津求見李相時李相正因軍務棘手滿胸積悶忽門上傳上袁世凱名刺心中正恨他不把軍情報告方要傳見好當面申飭他便傳出一個請字袁世凱即昂然直進行禮之後李相即厲聲道你在朝鮮好清閒卻把軍情不顧誤國不少袁世凱道卑道正爲接得尊電蒙丞相責備故千辛萬苦回來要見中堂一面卑道自問沒一事不盡情報告今蒙丞相責備望中堂指示卑道的罪名李相道你還說日本調許多兵馬到了韓境你如何不告我袁世凱驚道中堂甚麽話那有一次不報告的便把自己第一次是什麽報告第二次是什麽報告一概說出李相道難道老夫是不識字的連電文也看不出不成袁世凱道既然如此卑道發來的電文中堂還有存下否請賜回卑道一看李相聽罷此時仍不知是張佩綸作弄即檢出擲至袁世凱面前並道你且看袁世凱接在手裏一頭看一頭汗如珠點看罷即道奇極卑道甚望中堂查究此事說了即在身上拿出自己發來的原電文當面一對隨又道卑道因爲中堂見責特檢原電回來呈中堂一閱今見中堂接得的電與卑道原發的不符中堂一看便知分曉李相此時已放下幾分怒氣即把袁世凱獻出的電文對覽一會滿面通紅又露些慍怒之色然後低頭一想不覺將案上一拍一言不發隨令左右轉令文案員發劄傳電局總辦張佩綸到衙相見搖首歎息一會謂袁世凱道若張某到時你且暫避他老夫盡可查悉此事你見著那姓張的也不必生氣袁世凱謝過李相心上盤算仍恐張佩綸是中國人又受中國薪俸且爲李相姻親何至如此難道他受了日人賄賂不成只怕未必有此事又不免疑朝鮮電局作弊正籌度間忽報張佩綸已到袁世凱便轉進後邊及張佩綸到了袁世凱在裏邊細聽他翁婿有何說話再從門縫兒偷看只見李相全無怒容張佩綸見了反覺驚慌坐猶未暖李相卻道你總辦電報局的事情所有官電往來可是自己經手抑是統通委付他人你快說個詳細張佩綸沈吟了一會才道不知岳父問那一件若是尋常電報只由經理的人譯妥送交若關於國家事件統由小婿過目的李相到這時發怒道既是你過目的自不能責備他人你今已犯了殺身之罪誤盡軍情負了國家又陷了老夫你知得不曾張佩綸到這時已知是朝鮮發來的電報自己所塗改的已發作了又不知袁世凱已經回來只自忖自己改了電文也沒有對人說過何李相便知得心中捋上捋下只得硬說道岳丈此話從何說起小婿有何罪名總望實說也好李相見他如此硬說便再發狠向他說道駐韓委員發來的電文你盡把來竄改了你究懷著什麽用心老夫有何虧負於你卻誤老夫至此那時張佩綸已面如土色仍硬著說道所有駐韓袁委員來電統通是照原文譯出送來並無一字改易岳丈不要聽別人的話小婿實爲感激李相見他還矢口不認便心生一計即道已從朝鮮電局查出原電底回來與你送來的電總不符合你獨把日本調兵的人數塗改了你若不是受了日人賄賂如何肯幹此事你快些說個原故或可原諒若是不然便是老夫不殺你朝廷還容得你麽一頭說一頭拍案大罵又將袁世凱呈出的原底電文及張佩綸所屢次呈上的電文擲至佩綸跟前怒道你且看袁委員的原底電報同他不同若不是你將原文竄改了誰敢竄改你還好說當下張佩綸聽得是由朝鮮電局檢回原底額上已流著一把汗此時不免滿面驚慌雙手打戰拿著幾張電文又遺失在地故聽得李相所責駡已不能對答李相越發大怒要責他供出竄改電報的原因隨又喚袁世凱出來張佩綸見了世凱更不能置辯袁世凱念著前情一來恐佩綸難以下場二來又覺李相過不去即道事已至此中堂發怒亦是無用兄弟且問張老哥移改電文究是何意想老哥是個廉潔自愛的人斷不至受外人賄賂務請細言其故商量個辦法才是在世凱此言似是護衛佩綸實則坐穩張佩綸使他自承改電那張佩綸心亂之際如何悟得自然當袁世凱是好意即歎道我本來爲國反弄成誤國矣說罷不覺流淚袁世凱道你甚怎麽爲國弄成誤國呢張佩綸道兄弟自料己國不能取勝日人不欲開仗若把日人調兵實數報告料李中堂必先發大兵來與日兵相當恐兩國各恃兵力必至激成戰事故先前竄改電文實望李相緩發軍兵勉從和議實不料此次戰端觸機即發也李相一聽真是無名孽火高千丈拍案道你這小孩子的見識你道不派多兵便易成和議麽正惟派兵不足反受敵人挾制諸多要索反致和議不成是真虧你自福州敗仗回來還敢說軍事你聽著炮聲不走就好了還學人籌度軍情麽老夫治兵數十年被你牽陷至此有何面目見人且你誤國至此百死不足蔽辜你快回去自處老夫今日不能替你設法張佩綸此時更沒得說只使個眼色示意袁世凱求他說句話便滿面通紅抱頭鼠竄去了袁世凱暗忖道若自己力斥張佩綸覺自己更爲有功但念著前日交情意自不忍且李相又最愛親戚情面的盡令李相過不去於自己前程亦屬有礙便向李相道張老哥這會辦事真誤軍情不淺但也不過沒見識一時愚昧與受人賄賂的不同以卑道愚見只合責他擅自決事貽誤軍機終不能責他賣國他一點愚誠實在可憫中堂以爲然否李相歎道他以一己的私心致誤軍情本罪在不赦但老夫自問亦失計太甚視人派兵多少然後自己派兵多少已是誤了且老夫當初以自己任大責重常恐他人誤我故每事必委自己親人今卻沒一人可用的誤老夫至此恐明日紛以老夫任用私人還有面目見人麽說罷幾乎掉下淚來袁世凱自忖道俗話說丈夫流血不流淚看李相長成七十來歲的人說話間至眼皮通紅真不忍見即答道勝敗兵家之常中堂何便煩惱如此卑道有一言不知合否因中堂若置張佩綸於不言便是自己獨任其過外人聞之反貽口實不如輕輕參佩綸一本一來見中堂不袒私人一來見戰前派兵不多非自己之咎不知中堂以爲然否李相道佩綸不能不參但責任在我豈能徒委諸他人老夫自此必聲名掃地矣但一己不足惜恐國事亦自此益艱則老夫之罪更重也袁世凱惟再複勸慰問李相一會李相即留袁世凱住下自己退轉來獨自尋思自己從前卻錯責了袁世凱今番若把張佩綸的事切實彈參那張佩綸自然不免若是替他隱飾不特自己的名聲越加壞了更又對不住袁世凱想到此會更爲憤怒便親自起稿把張佩綸改易電文混亂軍情的罪狀切實參了一本當時朝廷看了李相那本奏章十分大怒發下軍機及刑部會議時軍機大臣明知張佩綸此次罪情非同小可但他與李相是有個翁婿之情且用人不當實是李相之咎盡要替他留個體面把原折細勘覺得張佩綸竄改電文不過不欲與日人開戰恐多派兵時易開戰禍故以如此塗改只是他的愚處不是他的奸處就從這裏替他想出一條生路複奏過了次日就有諭旨降下來把張佩綸發往軍台效力這一場大案就此了結且說當時自因水陸大敗只派李相父子前往日本說和賠款割地方能了結那時朝中文武又紛紛把李相參劾朝廷雖念他是個勳臣但人言嘖嘖終不免有個處分前者已拔去三眼花翎褫去黃馬褂一個北洋大臣已改令王文韶接充這會因參李相者仍絡繹不絕便又降一道諭旨責他用人不當著他留京入閣辦事李相當此覺用人不當四個字誠是不錯但在袁世凱一人也沒有什麽不當若不替他設法實在冤枉了他恰可和議成否朝廷因北洋是個緊要的去處不便委任他人乃換榮祿繼任即調王文韶入京那榮祿不是別人乃皇太后的內侄子由西安將軍轉任兵部尚書並任副相至此始出鎮北洋自從榮祿到任看見各路軍營於戰敗之後實殘破不堪用自須再練軍兵且以水陸軍勢盡喪水師實不易恢復惟有從陸軍下手就把此意奏知朝廷朝廷亦覺得此意甚是只惜戰事開時已耗資不少弄得庫款一空及後講和又賠了二萬萬兩去了練兵之事實不易言便批下來著榮祿就地設法籌款練兵當下榮祿接得這個諭旨覺練兵之說是自己發起今不得不行但籌款固難靠人亦難況自經敗後所有北洋統兵官員統通有了處分革的革殺的殺死的死雖是練兵亦沒人幫助因此便往訪李鴻章商議有什麽人才可用李鴻章回想清日戰事時各員沒一個不誤了軍情單是袁世凱還是留心一點其情可憫且其才亦可用便在榮祿之前一力保薦袁世凱井道自年前軍興以來沒一個不誤事的惟那姓袁的報告軍情沒一點差漏他平生亦有點本事盡合用得著榮祿聽得不勝之喜回衙後便即傳袁世凱到衙相見時袁世凱正得李相密報知道把自己薦往榮祿處忽見榮祿傳見暗忖自己在北洋差遣今李相不在北洋正該求榮祿賞識趁此機會便圖個升官想罷立進督署而去看官試想袁世凱是什麽樣人他巴結上臺用自己的才力是很有手段的當下與榮祿相見榮祿先把李相保薦他的話說了一番又切實問他練兵的事從那處下手袁世凱聽罷便壯著膽子伸張三寸不爛之舌說道卑道不才自問從前無補於國家今又辱蒙李中堂保薦大帥又不恥下問只怕卑道才力薄弱不足副大帥之期望況練兵重事早道資望亦輕請大帥另委高明免誤軍政榮祿道你不必過謙便是李相不保薦時我亦須用著你的了因爲練兵兩字是容易只就籌款卻不易言你在北洋有年料必熟悉情形盡可盡說倘有可行之處無不采行他日成軍功勞不少袁世凱道以卑道愚見若重新召募軍人耗資實巨日前兵敗之故不是軍兵不良不過訓練不得法加以器械不精而已且現在北洋淮軍毅軍若盡行遣散亦難安插不如在淮軍毅軍之中汰弱留強倘不足額然後添募合新舊勇盡行改練洋操從前所有的軍械挑選精良的一概用回若朽敗的把來沽去以資津貼實一舉兩便亦事半功倍且卑道猶有一說知己知彼百戰百勝我們於軍營事情縱有些經驗總不是從專門學過來的故現在要練陸軍盡聘一位外人充做顧問才好榮祿道適聞高論實開茅塞但聘用外人究聘那一國的才好呢袁世凱道以卑道愚見方今陸軍強國就算德日二邦鄙見猶主用日人因彼此同種同文目下又言歸於好且聘日人的薪水較廉故不如用日人罷榮祿聽了大喜便把袁世凱的議論奏知朝廷依著行事複奏保袁世凱爲練兵大臣正是不必才華能動衆全憑知遇促升官要知後事如何且聽下回分解第六回談新政袁氏擢侍郎發私謀榮相興黨禍話說袁世凱既得榮相保舉爲練兵大臣便聘用日人兩名爲顧問又將舊日北洋勇營汰弱留強再募些新額湊足六千人名爲新建陸軍日日訓練不必細表且說當時自戰事敗後京中各大員頗知得外人的厲害盡有些人知道日本維新後即能自強就要說到變法兩字那時就有一人姓康名無謂的本籍廣東人氏當初在本省講學授徒召集生徒數十替他鼓吹聲名捱了千辛萬苦才中得一名進士點了工部主事總不得志他從前因翁同龢在北京提倡公羊學說他便看了年把公羊春秋豈知那翁同龠禾凡遇著說公羊的就當他是有才幹的人物所以翁同龢也看上他他就投拜在翁相門下康無謂這時要圖翁相保薦盡要弄些才學動他才能得翁相信服故此接二連三上了幾次書統不過是說築鐵路開礦產設郵政廢科舉興學堂裁冗員這等話頭本是尋常之極只就當日北京臣僚看起來也當是有十分學問故此人人也識得他的名字他又想聯絡黨羽一來好張聲勢一來又可互相利用因此也立了一個保國會先是入會的有十數人各出來傳頌都道這康先謂先生很有才學又得各大臣吹噓不久也執大權的了這風聲一播你道京中各候補人員那一個不是熱中的只道所傳說的是真倒願憑點勢力好得升官因此進保國會的人數漸漸多了整整有數十人鬧成一片一面又運動翁同龢奏請降諭詔舉人才那時翁相方充軍機大臣說話是易的果然不數日即降出一道諭旨令大臣保薦人才那翁相自然把康無謂保薦同時又有一位梁希譽是康無謂的門生他有一個姻親喚做李端芬方任禮部侍郎的也一同保薦康無謂師徒二人至於他們同鄉的張蔭桓及一般說公羊的如張之洞如徐致靖張百熙也同時奏保康無謂又防自己獨力難以行事自然要先布黨羽所以當時保國會中人如林旭楊銳劉光第統得被舉充軍機章京康無謂又得了個總理衙門章京一連十數人或是禦史或是部曹倒把新政二字挂在口頭上好不得意那時朝家亦慮這班人防生出什麽事所以又派尚書孫家鼐做新政大臣好把這班人管轄不料不出朝家所料竟生出一件事出來反令袁世凱升官黨人亡命正是釀成黨錮彌天禍催得軍門特地升你道康無謂等弄出什麽事因爲當時天子年紀還輕因憤恨前此割地賠款不免輕躁偏是當時老太后在宮見著這般混鬧空言變法總不是路所以暗令有權有勢的大臣要覰察康無謂一班人的舉動那班人得知這點消息最防老太后拿著自己痛腳就暗中商議要除去太后才得心安在那一般人早知那老太后是不能容自己的卻是什麽原故呢因爲向例京官凡是部員要條陳事件若不是封章的凡尚書侍郎皆得拆閱看他合格與否那日有個姓王名照的都是康無謂一路的人正充禮部主事竟上一道條陳也說是指陳新政的並請皇上遊歷日本該部尚書許應馬癸懷塔布把來看過指出他有些不合叫王照總要改轉那王照恃著當日說新政的是得勢的人就咆哮起來說道前者皇上早有諭旨凡有屬員條陳不得阻擋的了你們恃著是個上司就要阻撓新政麽說罷不由那許懷兩尚書分說就跑了出來與康無謂商酌那時保國會中人正因那少年皇帝聽信自己的時候即紛紛把禮部各堂官彈參說他守舊拘迂阻撓新政只說王照欲遞條陳被禮部堂官擲在地上這等說當時朝廷大怒即把禮部兩個尚書四個侍郎一併革了這時禮部幾個堂官真有冤無路訴但革了別人猶自可革了那個懷塔布正與老太后有點子瓜葛的他天天在老太后跟前訴冤弄得老太后不得不怒因此便要窺察康無謂的舉動就是這個原故康無謂一班人覺此時若不除了老太后實于自己不便便與同道中人商議要謀個除去太后的法子各人都道昔要除去老太后一定要靠些兵力方能保得自己地位但我們天天談新政只是空口白話究從那裏尋得兵力出來呢康無謂道有人俺看袁世凱那人正是喜歡新政的一定與我們共表同情他現在有新建陸軍六千人在他手裏盡合用得著各人都道若是運動他盡要小心一點不要擅自泄漏我們宗旨是緊要的去處康無謂口中雖說是極惟心中早拿定袁世凱是可用的故各人致囑之言也不大爲意那日便求見袁世凱那袁世凱接見之際兩人即把新政談了一番康無謂即道皇上是足以有爲的單是老太后百般阻撓真是沒法現在更聞得老太后還要謀害皇上這樣若是我們做臣子的不能設法解救還算得是人麽袁世凱聽了心上反吃一驚因問道足下究從那裏聽得老太后要謀害皇上呢康無謂想了一想才道是皇上說來的並諭令我們要保護他今弟想我們食君之謀祿忠君之事且見足下是個忠義之人又是兵權在手故特來商酌袁世凱道據足下之意欲使小弟何爲康無謂道自古道先發制人待至太后下手時我們便救駕不及了不如足下先提本部人馬先至頤和園執了太后再請皇上發落便是袁世凱聽到這裏目定口呆也說不得出聲暗忖此人乃有如此舉動半晌方答道足下之言甚是但此事非同小可細思兄弟身分非得皇上明諭斷不敢行康無謂道此亦易事弟當面見皇上請他發諭足下便是說罷便去袁世凱這時自然心上持上捋下不料康無謂回去與林旭一班人計議譚嗣同倉皇道虧你把這些話來對袁世凱說此是何等事豈輕易能對人說來的麽康無謂此時不免悔恨惟硬著撒謊道此是袁世凱先說的不過運動我們求皇上發個明諭給他而已譚嗣同道弟不信有此事榮祿是太后的內侄子袁世凱正靠榮祿做官如何肯幹這事他幹得來便是榮祿殺他他幹不得來又是太后要殺他他做官正安穩何苦擔此煩難今事情重大總要說真話才好康無謂道終是譚兄多疑我那有說謊的道理林旭道既是康兄親聽袁世凱說的我們如何不信便大家計議先由林旭楊銳等一班軍機章京在皇上面前說太后要謀害皇上的事當時皇上聽了不知真假心上好不著驚且又一個少年無知任人擺弄的急向林旭等問計林旭道請皇上獨問康無謂他定然有點法子皇上便令召見康無謂到那日康無謂召見時更一力說太后的確要謀害皇上皇上當時聽了更爲心慌問有何解救的法子康無謂便道袁世凱是個忠義之人盡合用著請皇上獨召袁世凱著他保護皇上自沒有不妥的了皇上聽罷點首次日即傳旨召見袁世凱時袁世凱只在直隸練兵今一旦獨被召見京中皆以爲異事無不注意那袁世凱亦不料爲康無謂一班人運動只得人京引見那皇上一見袁世凱即令平身立令傳賜點心袁世凱方訝得此異數不知何故心上好不思疑見皇上說道朕素知你是忠義的只因自下變政或有些人反對謀不利於朕躬到這時你有兵權在手休要袖手旁觀袁世凱聽了就知康無謂日前的話有些來歷即道到這個時候臣自然要效力但皇上不要聽一面之言自起驚擾反生出意外的事來當時皇上道卿言甚是你盡要效忠才好袁世凱此時即伏地磕頭奏道臣安敢不盡忠說罷當時皇上即令他退出隨有一道諭旨降下來加袁世凱一個候補侍郎康無謂此時已知道袁世凱召見後朝廷大爲喜歡看來自己之計是行得的即再與林旭等商酌求皇上再降一張密諭好到時號令各官且調動袁世凱更易林旭亦覺得有理因把康無謂之意面奏皇上那時皇上自聽過袁世凱之言勸他不可聽一面之詞自起驚擾這時不免疑惑但林旭所請又似乎有理便把個雙關語氣發了一張密詔道是善保朕躬無傷慈意這八個字看來是不能動彈得老太后的這詔實不能把來示人那一日只管攜了那密詔往見袁世凱先問皇上有何說話袁世凱卻隱過自己對答的話不提只把皇上的話細說了一番康無謂歡喜道不差皇上已有密詔發付弟等足下兵權在手盡可行事袁世凱道既有密詔可能賜弟一觀否康無謂聽了覺密詔是不能給人看的自己也不合說出今見袁世凱索來觀看正是左右爲難沒奈何即說道這是發給兄弟的本不能給人看今足下既是向志便看看也不拘便拿出張密詔只露出善保朕躬四宇給袁世凱略略一看隨即收回袁世凱此時更滿肚思疑就知康無謂不是路但究竟不忍遽發不圖康無謂去後不時催促袁世凱發兵去圍頤和園袁世凱一天推遲一天總不見動靜譚嗣同好生憂悶惟康無謂對著各人總不把自己與袁世凱往來的事細說那日竟然飛函袁世凱促他發兵那袁世凱接了那封函覺發兵之事斷斷使不得又被其頻頻催促左思右想迫得沒法即拿了那康無謂的函直往求見榮祿時已深夜榮祿見袁世凱稱有機密要事求見即不敢不接他立即披衣而出見袁世凱獨自一人到來面色倉皇不定料知有些原故即問道足下夤夜至此有何見教袁世凱道沒事不敢深夜驚動中堂正惟事情重要禍起宮廷不得不來發告榮祿急問何事袁世凱便把康尤謂來說的話一一說知榮祿道他拿出的密詔究是有什麽字樣呢袁世凱道卑職疑其中另有別情因他拿密詔來看時只露出善保朕躬四個字也未有把密詔給卑職全看因此更覺可疑了榮祿道皇上召見足下時有什麽話說呢袁世凱道皇上只是籠統說法教卑職盡忠報國卑職曾勸皇上勿聽一面之詞皇上也以爲是看來那班人一定是造出謠言恐嚇皇上的可無疑了榮祿又道愚意足下所料亦有八九今他們請足下發兵足下只是一天推遲一天他們若不見你發兵時一定知得事情泄了自然逃走那時便拿他不著今事不宜遲愚當立刻走進京城面奏老太后好防備此事總要拿著他們治罪方稱本心說罷便拿出那顆直隸總督的關防乘夜不動聲色乘了單車人京而去那時雖在夜分京中各城門本已緊閉只是榮祿到來因有機密入京如何敢不放行那榮祿便一直到了頤和園口稱有機密要叩太後面奏所有侍衛內監倒知他是北洋大臣榮相又是太后的內侄子自然要告知太后時太后已經睡了聽得榮祿深夜至京必有緊要告發乃立即披衣起來召他入見這一會真教狡謀立破大獄旋興正是方謀結党圍官苑反陷同群逮獄牢要知後事如何且聽下回分解第七回革樞臣黨人臨菜市立阿哥天子入瀛台話說太后因榮祿夜來求見料知有緊要事情即召進裏面問榮祿何故乘夜至此榮祿叩頭說道若沒有緊要事情臣何敢夜深到來驚擾正惟關於朝廷安危及老佛爺性命不得不到太后聽罷驚得面如土色即令榮祿起來旁坐細說榮祿便把康無謂一班人所謀及袁世凱所說一五一十說出太后道難道皇帝也來謀殺我不成榮祿道未必至此但他們慫恿皇上說老佛爺將要殺他皇上不察信以爲然就諭飭他們救護所以他們就乘機謀圍頤和園口口聲聲說是皇上有旨說老佛爺阻撓新政先要除去實則爲作亂之計總望老怫爺立須決斷以杜逆謀才好太后道我明天即察問皇帝且看原委如何然後定奪榮祿道總望老佛爺不要遲疑因他們摧促袁世凱發兵袁世凱只推他明天舉事若他們不見袁世凱舉動定知狡計敗露先自逃走反令逆臣逍遙法外了太后聽得深以爲是便立發條諭令步軍統領衙門閉城大索逆黨督飭兵勇盡拿康無謂一班人統交刑部治罪一面又令榮祿速回北洋飛飭兵部截緝免令他們漏網榮祿領過密諭立即遄返北洋而去那時康無謂自念屢次運動袁世凱他口裏應承總不見發作