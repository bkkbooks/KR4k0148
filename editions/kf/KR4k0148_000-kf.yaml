說這會得逃難出來系得皇上先通消息知道榮祿入京定知有些不妙故能逃出若不是皇上通訊就不免同及於難這等說這點消息被太后聽得真是怒竅生煙因太后以當日火車停了城門閉了若不是皇上救他他如何逃得去故聽了也信爲真就不免遷怒當時皇帝以爲康無謂一班人正謀圍頤和園要殺自己若皇帝沒有給密詔過他自然要捕康無謂到來好對證如何反通消息於他縱他出去因此上自聽了康無謂自說由皇帝縱他逃走之語確信爲真立召榮祿入京商量此事那榮祿亦慮當時皇帝執權於自己終是不便便於召見時密奏道皇上本沒什麽主見只是聽小人擺弄終恐有礙大局務請老怫爺獨斷獨行才好太后道不知軍機裏頭各人意見怎地榮祿道容臣探看他們意見如何然後奏複老佛爺便是太后深以爲然榮祿便辭了出來到軍機衙門力主請太后再複垂簾之事原來當日變法兩字凡屬宗室大員十人中盡有九人不贊成的都道若是滿漢平等一旦漢人有權滿人就立足不住故於變法兩字多不以爲然不過當時皇帝主持各人倒不敢說今見康無謂一班人弄出這事一發要乘勢推翻況當時皇帝不是個有才幹的人一切權術總敵不過太后故各大臣之中倒惟太后之言是聽所以聽得請太后再複垂簾之語滿員軍機沒有一個不贊成其中有一個李鴻章卻說道想皇上經過這會事情必然悟得從前被人所愚的了以某愚見太后垂簾之說雖然是好較不如再候些時且看皇上舉動怎樣然後決奪不想李鴻章說了這話就有一個親王答道此乃我們家事李中堂你不必說罷李鴻章聽了滿面通紅不敢再說餘外漢員見李相且說不來自然唯唯諾諾次日便由軍機一同列銜具奏請太后再複垂簾聽政那折既入不消兩無即由當日皇帝發出一道諭旨自稱有病不能親理萬機複請太后垂簾這等話自此各事都由太后主持到那時皇帝反怨恨那班黨人不已以爲若不是逆黨在海外說出種種謠言斷不至如此但這時已悔之無及了且說當時皇帝既已失權又惜養病爲名天天住在瀛台裏面不聞外事沒有一個兒子那些近支親王又不免各逞雄心要圖承繼這個大位因爲當時皇帝亦是入繼的卻是太後親兒同治帝沒了不曾有皇子論起昭穆本該要立同治帝的侄子方爲合理惟是他侄子系恭王的孫太后恐怕恭王因自己孫子做了皇帝一定他自己執權于太后自己有些不合就改立了當時皇帝作爲以弟繼兄自即仿以來已爭論不少今一旦皇帝大權又無嗣子那些宗寶近支自不免互相覬覦在裏頭也巴結太后在外面又巴結榮祿欲爲將來立嗣的地步這等人已是不少單是端郡王載漪亦是一個近支宗派他有一個兒子年甫四齡喚做傅儀向來頗得太后喜歡那端璵榮祿又是一個知己一來端王爲人卻有點心計與榮祿提議請太后垂簾之時是端王首先主張的故立嗣一議自太后以至榮祿倒屬意傅儀一人但是端王心裏只欲兒子急做皇帝若僅得立作儲君不知何時才得登位是以天天運動只要兒子即登大位好教自己早日做太上皇那時一班臣工早已知得太后之意倒未趨承端王替他盡力好爲將來保薦功名之計故自康無謂這案一出弄得京中大臣大天要謀廢立那當時皇帝又最不能得各大臣之心的個個倒知得有個太後也不知有個皇帝竟要跟端王一路走試想端王要謀自己兒子登位那有不盡力的道理但是太后還慮幾分人言恐怕各疆臣不服反成紛擾便發個電諭往問江督劉坤一及鄂督張之洞兩人因爲他兩人做了數十年大官一向恭順朝廷的料必從自己意見若得他兩人贊成不怕各督撫有些反對果然張之洞接得電諭之後不敢複答一字他明知這件事不好做但恐太后不喜歡故不敢言就敦起一個名教家的款子以爲不忍言罷了獨劉坤一複一道電說是君臣之分已定中外之口難防臣所敢言者在此臣所不敢言者亦在此這四句話太后想來覺有道理便密召榮祿商議時袁世凱亦在榮祿跟前極不主張廢立的事所以太后與榮祿到這時只要立儲再不主行廢立的事太后複向榮祿問道便是立儲一事你道京中大臣還有人阻撓沒有呢榮祿道除了李鴻章料沒有一個敢說別話的了故不如把李鴻章先遣開離去北京因他是個老臣怕他要來力爭我們也難處置那時責他又不好不責他又不好呢且北京裏頭不知皇上有與人函通消息沒有怕再有像康無謂的人搖東擺西怕又要鬧出個亂子來了故這件事總要細心打算才好太后聽得也點頭稱是次日便令李鴻章做個商務大臣出京查辦商務一面又發道諭旨托爲皇帝所說稱病重要行立嗣爲承繼大統之計正是誤通逆党言新政致立端藩失大權要知後事如何且聽下回分解第八回附端王積仇騰謗語發伊犁送友論交情話說當日太后定了立儲的主意朝中各臣倒是畏懼太后的也沒有一個反對就托爲皇上有病未有儲貳乃立端王之子傅儀爲大阿哥這等說那一個不知得這道諭旨出諸太后之手只作爲皇上口氣呢但那時皇帝不是個有能幹的人所有朝臣統通是太后的心腹只有四朝元老的李鴻章也托稱派他爲商務大臣離京去了餘外那一個敢說個不字因此端王的兒子就安然做了個大阿哥自此端王也感激榮祿不已他一面又巴結太后好逐漸攬權那榮祿猶不自知只見端王待自己很好就當端王是個好人反自以爲擁立有功心中竊喜那一日對著袁世凱說及立大阿哥一事袁世凱道這等大事卑職本不合發言但蒙恩相見愛在這裏又只說句私話也不算什麽公事故卑職敢貢一言以卑職愚見恐這件事也不太妥當榮祿道以老兄所見料這件事究竟怎樣袁世凱道皇上猶在壯年設他日或有皇子自然費一番調處縱或不然那端王嗎只怕不是個好相識的榮祿道你從那裏見得袁世凱道卑職素聞端王志大言大且好結交黨羽現在朝中是他心腹的也不少了這樣不是甘居人下的人惟他近來見著中堂何等恭順可知其心盡有點非望的了榮祿道你的話也說得是但他縱懷非望現已得自己兒子做了大阿哥可就心足還有什麽非望呢袁世凱道不是這樣說但凡一個人若是有非望的沒論做到什麽地位儘是得隴望蜀得寸思尺的他未得兒子立作大阿哥時也陰納黨羽何況今日且看他爲人面肉橫生聲若狼虎料他不久也得大權到這時總要鬧出個亂子還有一件是中堂要想想的他既是不甘居人下的因何對著中堂獨要恭順可見他的意思不過現下他要靠中堂點子力罷了榮祿聽罷只是低頭一想覺袁世凱之言很有道理因此不免有些悔意原來榮祿平生最信袁世凱亦見袁世凱有點能耐也很輸服他故此時聽得袁世凱的活不得不信卻道你言很是但何不早言之今已不及了袁世凱道中堂差了古人說得好位卑言高實自取罪李丞相且說不來何況卑職今因中堂說及是以敢讀一言若不是中堂提起時卑職也不敢說了榮祿聽罷自覺事已弄成實無可如何惟有搖首不答袁世凱便行退出不想端王自得兒子立爲大阿哥之後京中各大臣倒道他不久是要做太上皇的那個不欲靠他門下好爲將來之計凡獻殷勤拍馬屁的也不能勝說故袁世凱與榮祿所說的話早有人報知端王端王聽得心中大怒正要逐去袁世凱猛想起那姓袁的是榮祿心坎上的第一人若要奈何他只怕榮祿要替他出頭那榮祿既是太后內侄太后必然幫助榮祿反不喜歡自己這卻使不得正自尋思忽報大學士徐桐及協辦大學士兵部尚書剛毅到來拜見端王接進裏面坐下原來徐剛二人自從立了大阿哥之後沒一天不到端王府裏坐談當時徐剛二人見端王有些怒容便問道王爺似有不豫之色究竟爲著何事呢端王道不消說了那袁世凱是甲午之時殺不盡的人仗著榮祿看上他他就恃著一個侍郎銜練過兩營兵就要說我的壞話了你道可惡不可惡呢剛毅先答道這還了得他只是個侍郎銜就要小覰了王爺倘若是他官位更大了怕要作反了剛毅說罷還見徐桐吐出舌頭驚起來說道剛中堂的話真說得不錯但那姓袁的爲人是老夫最知得的他今日得了侍郎銜實怪不得他這樣恃勢因他做道台時已看不起老夫了剛毅急問其故徐桐道他從前得李中堂看上了派往朝鮮去他進京時老夫在翁同龢那裏與他同席他總說外人有什麽鐵甲有什麽機器來哄騙老夫老夫聽不過也教訓他幾句他竟然搶白老夫總令老大過不去還成個什麽下屬的樣子所以那翁同龢總識不得好人的了剛毅道不差他做道員就看不上尚書宰相他做侍郎銜就看不上王爺若做到總督定然看不上皇帝了但不知他怎樣說起王爺的壞話呢端王聽了徐剛二人之言已如火上加油這時卻道是北洋一個人寄函前來說知他卻在榮祿跟前說的一頭說一頭拿了那封信出來交給剛毅並道你看看罷原來剛毅並不識字的接了那封信看一會差不多要面紅起來但又不好說不識字只將原函轉遞給徐桐井說道函內字樣太過細小老夫不曾帶上眼鏡子總看不清楚你看罷不提防那徐桐亦是不大識字的他不知憑那點工夫點了一名翰林充過幾任總裁主考都是之乎者也鬧過了故當下接了那封書看來看去總看不了完暗忖自己是翰林出身如何好說不識的話況說出來又要被王爺小覰自己了可恨剛毅太狡只說不曾帶上眼鏡就把這個難題推在自己身上想來想去有什麽法子可說猛然想了一計即道這函內所說的老夫不忍說出了實在冒犯王爺得很虧他受朝廷厚恩要說王爺這些壞話還算得是人麽端王聽了憤然道若不警戒他將來盡礙我們的事叵耐榮祿苦苦要賞識他故去他也不容易總望兩位留心看看他若有什麽差錯盡要擺佈他的剛毅道他爲告發了康無謂這宗案情本是大大的功勞該要提拔的只是老袁這人總不把我們看在眼內實在可惡故這時因他告發大案的功勞不能在老佛爺跟前說他壞處惟有先阻他的升階再慢慢擺佈便是說了端王徐桐皆以爲是故袁肚凱當時告發逆謀實是太后再複聽政總不能升調榮祿力保了幾番都爲端王所阻那一日有個山東巡撫缺出這山東省正毗鄰直隸本可以東撫兼練北洋軍兵實最合調袁世凱去的那榮祿先到軍機處見了各樞臣要保袁世凱那剛毅卻道中堂受北洋重任現在正練兵的時候除了袁世凱實沒一人用得著的今練軍還未成就若只令老袁在東撫兼顧就不能專一了老袁不過四十歲的人不患沒升官的時候不如待他專意練好了陸軍顧緊京畿門戶然後再升罷榮祿聽了覺剛毅的話明明是阻撓反長篇大論故意說袁世凱的好處來弄光面實在可恨但自己畢竟是外任總督不能干涉軍機的許可權沒奈何辭了出來往見太后力保袁世凱可任山東巡撫太后已經應允榮祿以爲端王剛毅兩人總拗不過太后不想那日太后召見剛毅問他袁世凱爲人怎樣剛毅就知此話有因但要討端王意思總不宜放他巡撫便力言袁世凱的好處一面又言北洋練兵緊要不能少他一人那太后又問練兵一差能否令他到任兼顧剛毅卻奏道若練兵已有頭緒的自能兼顧得來但今時方開始練兵就不能不專一了太后深以爲然剛毅退出好不得意大凡阻人進用的若只說那人的短處其術還淺若從他好處說起卻在暗中阻撓這等狡汁沒有不能售去的所以當時太后就著了剛毅的道兒畢竟那袁世凱升巡撫的官運要阻遲了兩年又該山東直隸地方要弄出件天大的風潮