京津一帶都把美人計賺得做了撫台的事傳遍段芝貴還不覺得什麽風聲卻先有屬員把這點消息傳到袁世凱耳朵裏袁世凱恐此事有些不妙只催段芝貴快些赴任兔有中變那段芝貴以爲朝諭已降還有什麽中變一來因買贖楊翠喜的事籌款之力已經盡了這會又要籌款送禮於京中大僚好結爲內應又要籌款赴任如何便能啓程故雖袁世凱如何催促只是一天緩一天滿意設法帶幾個人赴任想世人升官之念要緊欲隨自己到省領差使的沒有不願借款與自己的道理也天天只在這一點著意不想初時升做巡撫的諭旨一下還有多人到來奔走冀圖帶省委任惟後來也漸漸少了心中正不知何故不料人言嘖嘖倒道有這等運動升官的法子還有什麽官方還成什麽國體便激動了一位都老爺出來參了他一本那位都老爺姓趙雙名喚做啓霖乃湖南人氏平生也有點子直聲後來考得以禦史記名即補了缺不時上書言事還切直不過所以他雖然是一個五品言官等閒的大僚也不敢惹他偏又湊巧恰那時岑三又由川督奉調人京他與慶王父子又不大對的也不免授意于趙啓霖一力慫恿他速遞那一本參折自此折一上把內中情形和盤托出軍機倒知道了慶王又不免向自己兒子責駡慶王子沒法迫得出京向袁世凱求計袁世凱道老段辦事總不得法一點事兒弄得到處皆知某料此折一上因此事不比尋常實是大壞國體朝廷一定大怒今番大爺總要自己打算不要再顧老段了慶王子道這個自然自謀不暇何暇謀人但自計亦不曾有法子統望老哥指教袁世凱道某料朝廷必派員查辦無論派什麽人他到津時第一定替大爺說項但楊美人倒要先令他暫時出京滅了形迹那時任說老段有十萬金買妓的事沒有憑據是送給自己只老段那一個撫台總做不成了慶王子聽了仍有不舍送楊美人出京之意只躊躇未決袁世凱道大爺倒不必思疑總要替尊父留點面子也好不是教你永遠棄此美人但自下除了此策更是難說的待這美人出京後至查辦的到來弟再隨機應變便是慶王子沒奈何只得急即回京對楊美人告知段撫台已被禦史參得厲害今番朝廷一定生氣都爲著你的事情起的才說到這裏在慶王子還未說完那楊美人即道既是他被參大爺盡要替他設法妾非他無有今日望看妾情面保全他那個撫臺地位罷慶王子聽了又好惱又好笑卻道你好不懂事怕他不做那個撫台還不得了事還要保全他要做撫台麽況那位禦史是說不得情字的他的參折還牽涉我自己我如何能替他設法呢楊美人道可就奇了大爺父子在朝那一個不怕誰敢在虎頭上來捋須那位禦史難道有七個頭八個膽敢犯大爺不過大爺推搪罷了這樣是使妾無以對段大人反是恩將仇報了說著滿心不快慶王子又道你真不明我心的自從那禦史遞了本參折我早被父王罵了個不亦樂乎你試問我父王倒生氣起來我還有什麽法子可設我早跑了出京尋那袁世凱商量求他設法他說段某那個撫台是斷斷保不住的但朝廷必派員查辦此事不論派什麽人查辦袁某也肯向他說項把案情弄輕些還教我把美人暫送出京待風潮過了才回轉來這樣說我自己還自不了怎能計及老段呢說罷歎息一番楊翠喜聽到這裏覺慶王子所說像不是說謊的才驚道大爺說什麽話連妾也要驅逐出京麽我不信你個有手面的人還保一個女子不住想不過始亂終棄就借頭借腦賺我離去罷了說了大哭起來慶王子意自不忍只得撫慰了一番又道我那有厭你的心不過事情至此實無可如何況把你暫時離開又不是永遠不接你回來的只求眼前避去旁人的耳目不久也迎你回來這裏的了你盡要體諒我的苦心才好楊翠喜道大爺既說被你父王責駡難道是將來迎妾回京就不受父王責駡嗎你既是怕你父王的那裏還敢再迎妾回京看來只想騙妾離去此間罷了慶王子道難道要剖了我的心出來給你看過你才信麽試問我迎你來京有多少時候斷沒有住了幾天就生厭的你若不信時終累了我日後彼此都是無益呢楊翠喜到此時覺慶王子的言已像十分情急的再不好不從便又說道你若將來真個再迎妾時怕你父王又要責罵卻又怎樣呢慶王子道父王不過爲那參折牽涉於他故一時之氣把我來罵若事情已了斷沒有再理的且那位禦史目前雖被他參了將來盡要報復他自此誰敢道我一個不字故你我兩人若要長久盡要聽我的說話才好楊翠喜此時方拭了淚依慶王子所囑收拾些細軟打點離京慶王子又贈他許多金寶好安慰他的心又敦囑他到天津時不要張揚楊翠喜一一應允然後慶王子使心腹人直送他到天津去了果然不上兩天朝廷早派出丞相孫家鼐查辦此案那時孫家鼐覺此案料不能隱瞞若據實發將出來好令慶王面上過不去且慶王當時正執大權炙手可熱又不好結怨於他真是左右爲難沒可設法只得與袁世凱商量個法子避重就輕只說段芝貴是有點才幹的故慶王委任於他慶王子實無索送歌妓之事不過段芝貴得了撫台欲送一個女于給慶王子爲妾也是有的更說那女子亦不是十萬金買來這等說總不外事出有因查無實據後來以段芝貴行爲不好撤回委任巡撫之命慶王子又自稱畏避人言先自辭職去了好免人議論可憐段芝貴枉費了十萬銀子終不得一個高官到手實在可笑遂把天大的案情就了結去了其後軍機裏頭各大臣都體慶王面上把禦史趙啓霖遣回本籍而去慶王子又已辭職自然沒什麽畏忌不消一月重營金屋也再迎楊翠喜入京惟一面安置段芝貴使他放心待有機會再爲報答而已後來仍不時謀委任段芝貴一個要差這都是後話不提且說袁世凱自經過段芝貴一事以後各人議論更多都以段芝貴是袁世凱手下的人老段運動做巡撫的事也疑他是主謀的總不免或具折參劾或于召見時面參袁世凱權勢太重不一而足袁世凱聽得這點消息自想權高多忌計不如開去些差使一來免被嫌疑二來又可省自己不致太過辛苦況且鐵良要攬兵權已非一日且當時各部改過名目稱是各專責成便先遞了一本折稱自己才力微薄不能兼統重兵且以陸軍部改立自應由部管理以符定章等語自此折一上鐵良好不歡喜天天到軍機運動要將袁世凱這一折批准其手下如良弼鳳山等想在軍機裏頭求個優差的更爲著急都幫著運動故軍機裏頭第一是醇王要解他兵權餘外亦多嫌袁兵權過重惟當時老太后尚在覺鐵良之才恐不及袁世凱況各鎮由袁世凱手上訓練亦不便遮易生手只以袁世凱兵權過重亦不可不慮便令把第二第四兩鎮仍由袁世凱訓練余外統歸陸軍管理此旨一下鐵良自然歡喜正是耳內未曾聞戰事手中今又綰兵權要知後事如何且聽下回分解第十九回息風謠購槍驚各使被讒言具表卸兼差話說袁世凱既卸了四鎮兵權仍擁各項要差兵勢仍不少衰故此內外大員仍奔走如故凡有國家大政那慶王還不時請袁世凱入京商議惟解散大半兵權之後各國倒有些詫異以爲中國今日治理陸軍除了袁世凱本無第二個人何以忽然減削了他的權勢也竊竊私議更有駐京各國公使亦有到慶王那裏探問原故慶王答稱因官制改成故將各鎮陸軍隸歸陸軍部統轄別無他意各公使終不以慶王的話爲然又問他既然是改定官制要將各鎮軍兵隸回陸軍部管理就可以用袁世凱做陸軍部尚書偏又不然只怕那鐵尚書的才具終有不及袁世凱的恐於軍政裏頭有些不妥說了慶王沒得可答只稱用人之權出自朝廷這兩句話各使疑終不釋因此東西人士揣測更多不過數日間英京泰晤土報就刊出一段新聞標出題目道是中國維新之大概惟那段新聞內容卻道中國革政之情形自表面觀之似有進步之象然細察其實情則尚未可恃也據近日消息頑固腐敗之官員複攝大權而主張維新之卓卓者爲袁世凱唐紹儀等則漸失勢力欲于此時卜中國維新之事業恐尚須經歷多年之劇烈戰爭方能達其目的也忽而揚言維新忽而主張守舊莫衷一是之慶王及外部尚書守舊之瞿鴻機仍令爲軍機大臣矣以廣西巡撫林紹年素爲慶王之附庸今亦人軍機矣榮慶早簡爲學部尚書載振派爲農工商部尚書鐵良又簡爲陸軍部尚書薄廷爲度支部尚書陸寶忠爲都禦史以上各員多系滿人且其中有最頑固者此等人才于中國之維新固無裨益而袁世凱經二十人之力參劾其妄改官制已將所統陸軍數鎮之權力削其大半而今後兵權當不在於袁手而在無知之鐵良矣載澤本主維新者今只授以無關輕重之職外交家之唐紹儀亦已改授爲傳郵部侍郎惟赫德已爲郵政總理故唐紹儀只擁空名而已其最失望者則爲各省將軍及舊有之旗兵仍各耗俸糧並未裁撤故清國維新之前途甚爲可慮也自這一段新聞刊出駐京各使都接有各本國政府的電詢問中國情形喧成一片因泰晤士報是地球上報界佔有大勢力的它的議論一出各國倒信清國不是真正維新只是混鬧大有輕視清國之心更有些駐京公使往袁世凱處探問朝廷意旨因何要削袁世凱的兵權那袁世凱是個機警的人就知各使來問必有些意思便答稱並非要削兵權不過新改陸軍部故將舊日練成的陸軍歸他管轄現在還要增練陸軍務使三年之內在國中要練足陸軍一百萬然後議及海軍這等語各使聽得都在半疑半信之間去後袁世凱自想各國因此次自己減少兵權便如此議論只怕此後外交又有些棘手故自此接見外人必商及購辦槍炮之法研究那一國那一廠爲最精以爲虛張聲勢因此在天津各洋行的總理人天天奔走直督衙門運動袁世凱冀他向自己購買槍炮袁世凱知各洋行著了自己道兒故所有各樣行總理所運動的部不應允那日獨自入京先見了慶王具述此次因減去兵權各國疑惑之處又述各洋行的總理到來運動然後把已意告知即往見德國公使專談購槍之事要向德國克虜伯廠定購計要毛瑟槍一百萬枝大炮一百門俱要上等貨德國公使也不知袁世凱用意以爲真個購辦槍炮便道聞閣下已卸去大半兵權何以又由閣下手購許多槍炮呢袁世凱道此不過把練成之兵交由陸軍部管理今須由弟手重新再練陸軍一百萬支配各省故槍炮須先行購定德公使此時也信以爲然但暗忖訓練陸軍一百萬所費不資如此鉅款中國究從那裏籌劃因此也有運動袁世凱向己國借款之意便問道如此甚好但所需鉅款現時究籌有的款不曾若要籌借外債弟必爲盡力袁世凱道此次籌款也不勞費心現定練軍款項分爲四宗以一宗由各省攤派以一宗由直隸募公債及度支部籌撥余外兩宗倒由老太後撥發私儲及內務府撥出故款項先已籌定然後小弟方敢下手務求貴大臣向貴國各廠核實價目不要浮開他日成軍當感激貴大臣不淺德公使聽了袁世凱一番言語便信購辦槍炮之事爲確切不移便應允必爲盡力袁世凱也稱謝而退次日又再會德國公使都是談論購槍的事一連會議了三四天然後回任那時德使自然召集本國寓京津的商家前來商議打算要替袁世凱購辦洋槍一百萬枝大炮一百門看價目貨式如何好回復袁世凱即行購辦免被別國人攙此利權因此各德商也打算此事以爲攬得大宗生意自然歡喜因在中國是袁世凱經手在本國是公使經手沒有不信以爲真的正擬會合各德商聯同代辦免致彼此競爭惟自此風聲一出各國無不震駭以爲中國不知有何舉動要急練百來萬的陸軍都互相傳述在袁世凱聽得也不免暗笑因爲自己失了四鎮兵權各國詫異言三語四故出此一策好來戲弄各國不料各國也被自己戲弄上了自不免與幕內各員談及此事那些幕友道大人此策不怪各國相信但將來沒有實事卻如何回復德公使卻不可不慮袁世凱道此並無難處我早已對慶王說過來只有延緩的法子便可以複了他在袁世凱雖如此說但北京裏頭那些宗室是最多疑忌的聽得各人傳說是袁世凱向德國克虜伯廠定購快槍一百萬枝大炮一百門究竟因什麽事又不是朝廷著他購辦的便是由國家購辦也不至要用一百萬枝之多想其中必有原故況他是親向德國公使關說的料沒有虛僞難道袁世凱因被朝廷削了兵權故懷怨望另有些舉動不成這點風聲飛到鐵良耳朵裏鐵良益發驚駭便往見德國公使問袁世凱曾否到來定槍德使答稱是是旋問鐵良是否中國要練足陸軍一百萬鐵良覺朝中並無此事但袁世凱如此說不好向德使說破只好由自己內裏打點便順口答了一個是宇旋問德使道袁世凱到來定購槍炮是說辦往北洋抑仍歸陸軍部購辦呢德公使又道他並不曾說過只稱已籌有的款不勞借債又不曾說槍枝到時運往何處只托本大臣與敝國商行核實價目即行定購罷了鐵良聽了更爲疑惑但不好向德使說出自己心事只得告辭而出即尋醇王說知袁世凱購毛瑟快槍一百萬枝的事那醇王是個年少的人一聽此話即如憤火中燒直入宮裏求見太后把袁世凱舉動向太後面奏時太后聽得本不大信因袁世凱不是個愚拙的人他若有不軌的心自然好生秘密斷沒有親到京裏與公使面商購槍的道理但醇王說得十分確鑿並言是鐵良面見德使親聽德使訴說的沒奈何只答稱待查過確實倘有此事定要處置他但不要聲張傳出去盡有不妥醇王唯諾而退太后即召慶王進宮獨對問袁世凱是否有自行招兵購槍之事慶王聽了就知此事有些原故因袁世凱先已對自己說來便把袁世凱假託購槍的用意一一說出並道外人不知中國改定官制之意以軍政大事忽然以鐵良代袁世凱遂起謠言故袁世凱不惜躬犯嫌疑自稱再練陸軍百萬所以穩住外人之心並無他意太后道我亦料袁世凱斷無他意他若懷了不軌之心何至明目張膽與德使商量購槍今聞賢王所言更不必思疑慶王道太后明見萬里袁世凱當永爲感激說罷辭出即以此事告知袁世凱那袁世凱聽得不覺歎道某不過借此欲戲弄外人不想又爲小人所伺今後種種掣肘辦事益難了若非太后明白某今番如何得了想一回又歎一回再忖自己是個疆臣惟內政大事某必預聞無怪招妒且各項要差皆在自己身上小人求差不得的必以自己爲衆矢之的計不如卸去各項要差自削其權免爲小人藉口豈不甚好說罷便不待商諸幕友即行執筆擬起奏稿專請辭差那奏稿道奏爲瀝陳下情籲懇恩准開去各項兼差以專責成而符新制恭折仰祈聖鑒事竊臣前以兼差太多力難兼顧曾疊請分別開去兼差屢奉溫語慰勉臻至震悚莫名臣複何敢固辭上瀆聖聽伏念臣世受國恩及臣之身叨荷愈重特達之知非常之遇眷注彌篤倚畀愈隆臣雖至愚天良具在當以有生之日皆圖報之年即蹈湯赴火肝腦塗地亦不足爲萬一之酬報重以時局艱難深宮焦勞未嘗或釋凡屬臣下皆當感激努力以慰宸衷況受恩如臣何敢辜負生成稍涉規避是以鞠躬盡瘁之思不特安逸所不敢圖即毀譽亦不敢計但爲管見所能及棉力所能勝者靡不竭慮以圖無如心雖有餘力常不足臣之才智不逾中人臣之氣體更甚羸弱近歲叠膺艱巨精力更遜于前時矧天下之事理無窮一人之智慧有限故數載以來臣之負咎當已多矣不特此也自古權勢之所集每爲指摘之所歸今當聖明在上衆正盈廷本無庸過慮惟臣向以愚衷自矢夙蒙聖主優容信任不疑自當力任勞怨而臣獨不免私憂過計者非徒以滿盈足戒顛複堪虞良以國家方艱大廈非一木之能支巨川貴同舟共濟而深思靜慮誰不如臣若重寄常加於臣身則疑謗將騰於衆口使臣因此受貪權之誚將無以自明即旁觀亦因此啓猜疑之漸矣昔曾國藩常奏稱臣一人權位太重恐開斯世爭權競勢之風等語臣區區之愚竊亦慮此則非止爲臣一身計兼爲大局計而不得不瀝陳于君父之前者也現值改定官制明詔所布首以專責成爲言仰見聖朝亮工熙績綜名核實之至意欽佩曷勝臣以爲欲專責成須先明許可權而臣所兼各差如參預政務如新定各部尚書之職銜與各國之國務大臣居中任事者相類臣忝爲外僚末官兼任如會辦練兵及辦理京旗練兵等差現在陸軍部已經設立以練兵處並入軍政所彙責有攸歸臣可無庸分任如督辦電政督辦山海關內外鐵路督辦津鎮鐵路督辦京漢鐵路各差現在郵傳部亦經建設電政路政應隸屬該部自無須臣督率經理如會議商約一差現在英美日本等國商約均已議定自後有轍可循亦無須臣再參末議以上臣所兼差共計八項擬請旨一併開去臣決非敢避勞耽逸亦非敢避重就輕以後無論何時設有重大事宜須臣贊畫臣但奉命辦理決不敢稍爲推諉現在委因差務太繁實非才力所能及事權過重複非臣下所敢安用是不揣冒昧披瀝瀆陳合無仰懇天恩俯允臣請不勝感激恐懼屏息待命之至所有微臣瀝陳下悃請開兼差緣由謹恭氣折具陳伏乞太皇后皇上聖鑒訓示再臣前領有督辦電政大臣關防督辦山海關內外鐵路大臣關防督辦津鎮鐵路關防各一顆俟奉諭旨後即將各該關防一併移交郵傳部酌量繳銷合併聲明臣謹奏自此折一上袁世凱先密告慶王請他不必替自己挽留因此軍機中人自然要卸去他的兼差好削他的權力若鐵良一輩滿意要代袁世凱掌握權柄的自見袁世凱上表請開兼差之後更天天在樞垣運動好將袁世凱辭差的折奏批准了那時自己的權柄方更重大在軍機裏頭亦見袁氏折中語氣句句屬於實情亦不必阻他因此會同詳奏太后立時下了朱批只得著照所請四個字便將袁世凱向來所有各項兼差一概開去了正是闕下方陳辭缺奏朝中已遂集權謀要知後事如何且聽下回分解第二十回慶生辰蘭弟拜蘭兄籌借款國民責國賊話說袁世凱因爲各位宗室人員所忌迫得上表辭去兼差當時朝廷已有旨發出系著照所請四個字便把一切差使統通開去了那時袁世凱以爲從此可以免得諸臣所忌不想那時宗室人員有許多恃著是天潢貴胄一來以袁氏從前權重不免睥睨儕輩二來又有從前受過袁氏氣焰的固樂於削他權勢故到此時雖減了兵權開去兼差猶若餘怒未息更日肆謠言有說袁世凱失了兵權久懷怨望的有說他今更因開去兼差口出怨言的更有說道他黨羽既多且尚有兩鎮兵權在手即現時改歸陸軍管帶的四鎮內裏什麽統制管帶那一個不是他心腹的人若一旦因怨發難怎能制他因此以爲袁世凱那一人正想像范增論韓信的話用則用不用則殺這等話你一言我一說天天謀不利於袁世凱鐵良便與部下良弼計議再要設法一併收回袁世凱手上所存的兩鎮兵權原來那良弼亦是滿人曾遊學日本學陸軍已是卒業回來的恰那時鐵良正謀爭權良弼又正謀得缺自然互相利用故良弼回國後即投在鐵良門下那鐵良全然不懂軍事的因爲恃著一個良弼幫手懂得些日本陸軍形式故敢天天紙上談兵覬覦兵柄其實一切計劃都是良弼替他打算的鐵良自不免寵絡良弼是以不滿一二年間不次升握自改訂官制之後更用他在部中丞參行走及這時更謀並收袁氏兩鎮兵權急將與良弼計議良弼道那袁氏本有點子才幹的他沒有什麽馬腳露出斷不能在太后跟前說他的短處況他既爲太后所愛又爲慶王所重欲除去他卻不容易不如力說他是個得用之人趁著新改官制調他留京內用是名爲升他的官階實則削他的權力自可以從中掣肘他了鐵良聽得深以此計爲然便一面向醇王運動使言於太後之前力言袁世凱很有才具方今改定官制將行憲政看朝中井無能事之人不如以袁某人軍機辦理一切新政較爲妥協太后道此言亦是有理惟袁某自總督北洋以來尚稱平靜若調他人京怕北洋重地沒有管理的人卻又怎好醇王道北洋與京中相隔不遠有事盡可照應且北洋一任就令袁某薦人承乏亦好太后聽得覺醇王所言一片是重袁世凱的自然沒有思疑一來袁某在北洋屢被人參他攬權結黨若調他入京免他踞住北洋遍佈勢力自是要著二來醇王曾與袁某爭論政見致拔槍相向今由醇王薦他人軍機惜此融洽他兩人意見亦是好事三來袁某既在北京又可隨時獨對商議要政因此也允了醇王之請即行召袁世凱入京引見先諭以辦理新政需人要他在京統籌全局問他肯不肯袁世凱自沒有不允的道理但自忖在直督上用去款項不少雖是因公支用但究未曾報部作正開銷因此心上不免躊躇只得對道臣久蒙高厚漸無報稱今又以臣入贊樞務自當感激發奮安敢固辭但北洋尚有經手未完的事件恐人京尚需時日這等語太后道無論什麽事可交由下任的辦理只恐能膺北洋重任的究竟不易就由卿薦賢自代便是說了袁世凱謝恩磕頭而出到了次日即有諭旨以袁世凱爲外部尚書兼軍機大臣行走自朝旨發下那個不知朝廷這會把袁世凱名爲升官實則奪權惟是袁世凱心上以爲從前被人猜忌只爲兵權過重今兵權已卸盡去了還有什麽人讒間自己反能認真辦事不必瞻前顧後因此反覺心安一面上表謝恩又計算那一個人可能繼這直督之任雖手下人物甚多但有兩點難處一來自己向來位置心腹人員甚多盡要得個知己的人做了直督才能把自己所用的人保全名位實不啻爲自己保全黨羽勢力二來數年來練兵凡是有用之才有津貼的有賞給的志在結他心事因此耗錢不少至於招攬人才舉辦各事所有用去的尚有數百萬雖是因公用去究不曾奏准歸部作正開銷看來又須得一個知己人員繼自己之任方能替自己彌補左思右想究竟其人難得猛然想起楊仕驤那一人是自己向來援引他的自己從前又得他之力結識慶王今日正該把這個地位薦他承受且向日楊仕鑲服官直省又與自己十分密切的料他又必能替自己清楚首尾便先用密碼電商楊仕驤言明欲薦他升任直督卻約他兩事一是自己所用的人不要輕動二是自己任上未清報銷的款要他彌補若應允時就可立升直督這等語那楊仕驤是個官癮最重的人以爲袁世凱是自己的恩公本該替他彌補況又得升直督那直督一缺是個最重要的缺位有許多做了總督十餘年且不能希冀的今自己一旦由山東巡撫直得升授如何不允縱袁世凱虧空甚巨惟是直隸是個認真大省料亦不難設法便回復袁世凱所約二事都已應允袁世凱便具了一折力稱楊仕驤在直省服官多年情形熟悉且素有長才堪膺此任這等語朝廷已有意令袁世凱薦人自代的覽折無有不允立即准奏袁世凱一面打點交代便人京到外部任事去了那時袁世凱既人軍機雖是一個尚書究竟辦事很有權力因慶王系軍機領班大權本在慶王手上叵耐慶王才具平常凡事都倚著袁世凱故一切大事轉向由袁世凱主持故一般大小臣工沒一個不趨承袁世凱那時鐵良見了暗忖自己謀使袁世凱入京志在削他的權柄今他反得權起來心上總不舒服又要看著袁世凱的馬腳那袁世凱又以自己前在直督任上所有兵權倒被鐵良算弄出來更不免乘機修怨探得滿人鳳山系在陸軍部做統制的原是鐵良得力的手足若調離了他鐵良便少了一個羽翼恰值西安將軍出缺軍機裏頭正要揀人承乏袁世凱便圈出鳳山一個名字請揀果然次日諭下以鳳山補授西安將軍鐵良見了也吃一大驚正像失了左右手一般細細打聽方知是袁世凱作弄的迫得沒法惟以鳳山在軍中向稱熟手但求緩赴新任袁世凱又稱以鳳山授西安將軍系爲陝省練兵起見要鳳山交代停妥即行以程鐵良複多方運動方把鳳山暫行留京自此鐵良更恨袁世凱人骨誓要拿他的馬腳恰那一日袁世凱五十整壽所有大小臣工沒一個不致送壽禮袁氏第宅更鋪張起來十分華麗門前支搭蓬棚盡填塞車馬宅內皆懸挂錦幄地上盡鋪墊錦氈至於宇畫玩器也不勝其數各廳事分中西兩式擺設得十分齊整預備同僚及各國公使參隨到來祝壽一連數日都是接收壽禮十色五光不暇細述其中有些富豪官宦望他提摯升官的送禮更爲優厚有送禮一份費去十來萬金的若軍機四相亦有帳聯屏軸之類皆是金光燦耀有稱門誼的有稱姻誼的若慶王子自從因楊翠喜一案髮露後也感激袁世凱替自己彌縫已與袁世凱拜了把子結爲異姓兄弟故那時致送壽聯下款竟稱如弟因此慶王子這一聯頗攙人眼目因爲慶王是個宗室至親向例不能與外人結納私交今慶王子對著袁世凱反稱起如弟來如何不令人注意當下袁世凱也不覺得惟於各人禮物來則受之況是慶王於的更不好卻意且祝壽之日中西人到來拜賀已應接不暇前後數天都是擺壽筵唱壽戲分頭款待若至外鎮督撫提鎮藩臬亦有差人人京送禮祝壽的故凡款宴賓朋倒分數天第一天款待各國公使及參隨第二天是款宴京中一二品大僚第三天才款宴外省來賓及自己姻親故一連數天都忙忙碌碌袁世凱也應酬得十分疲倦數日之後只令家人把一切擺設及各人送的屏聯帳軸也一併收拾好了把慶王子稱如弟的事倒不記憶因爲祝壽起見請假了十天到此時方行銷假人值恰到軍機處裏頭見了一本奏摺雲是禦史江春霖參劾官制不善並於附片專參自己的袁世凱看了心上也不免吃驚只把他附片細細看下去見他參道再軍機大臣外部尚書袁世凱攬權結黨內自北京外而各省門生故吏佈滿要津久爲同僚所側目自由直督量移外部方以爲袁世凱兵權已解朝廷杜漸防微可免唐末藩鎮之禍乃跋扈囂張性仍不改此次五十整壽備極奢華內則王公大臣交相傾倒放棄政事以踵門祝壽外則督撫提鎮輦貨來京俱稱門生如奉君父凡賀壽者天津保定兩處購置禮物爲之一空而侍郎唐紹儀梁敦彥趙秉鈞嚴修及皖撫朱家寶吉撫陳昭常汁撫吳重嘉更不惜以堂堂大員屈身如奴僕以奔走候命於袁氏之門至若左都禦史陸寶忠副都禦史陳名侃且爲袁世凱過付壽禮其尤甚者則宗室王公貝子貝勒原禁與漢員私交聖朝成訓原以杜漢員奔競之風而絕宗室苞苴之路乃慶王子分屬懿親于袁世凱竟稱盟弟以宗室大員而趨附至此其他可知伏乞將袁世凱立行罷斥以免後患否則亦當稍裁抑其權勢以免有尾大不掉之虞臣遠觀前代近觀現勢夙夜祗懼爲杜漸防微銷患未然起見謹不避斧鉞附片以聞袁世凱看罷之後自己也應回避不便向軍機處同僚談論此折急回宅子裏看看各壽聯那位慶王於確是自稱如弟心中自念此事恰發在楊翠喜一事之後料得此折一人必有諭旨責成慶王子即于自己面上很有點關係及此折既人過數天還沒消息還幸朝臣看著慶王體面競留中不發袁世凱方自心安一面打探得此折又系鐵良主使心中又憤憤不過便欲設法治江春霖之罪即過慶王府來商議以泄此憤慶王道論起如弟兩字不過是親切之詞本沒什麽過犯袁世凱道那廝竟謂門生祝壽時津保兩處禮物購置一空實屬言之太過若不懲他妄奏此後何以辦事慶王道此言誠是但小兒與足下換帖拜把一事如果明行宣佈恐不能不予以處分是弄巧反拙了袁世凱道現在新政改革滿漢且准通婚何況拜把王爺盡不用過慮慶王聽了仍恐太過招搖力勸袁世凱不必理他若揚將出來反令江春霖那廝博個敢言之名實在不值袁世凱亦以爲是便不敢再提恰到了次日朝上適召見軍機太后沒一句話說即把江春霖一摺給袁世凱看袁世凱當時未敢奏辯太后亦溫語說道你們位高權重休要令人藉口才好袁世凱聽了只碰頭而出額上已流著一把汗即回至挂甲屯胡同宅子左思右想覺今天召見時太后面色實在不同料爲江春霖所參之故想那江禦史一來求升不得二來又受鐵良運動所致若不懲責他恐他此後膽子更大要天天窺伺自己如何是好想到這裏一團怒火自從頂門飛出時正在庭前往來碟躞一時不覺竟失了足在階下撲了一跤大叫一聲哀唷右足已覺有些瘀痛急喚了人來把他扶起這時已驚動家人張皇起來又不知受傷輕重且他已做到這個地位正是人貴則身貴即使小小痛癢家人且不免小題大作況他無心一跌傷勢自然不輕家人急的尋醫合藥好幾時方略略減了些痛袁世凱一面具折告了操時袁世凱的妻妾以他無故被跌正不知他因思想過步無心失足反迷信起來疑家內有些鬼祟都道這宅於不好住便遷到錫拉胡同宅裏自袁世凱既已告假在家無事每天仍有至交的朋友到來談話有問疾的有專要與他談天解他寂寥的也不必細表那一夜已有二更天氣忽門子呈上一個片子說稱這人因有事是要求大人賞臉傳見的袁世凱看那片子是汪大燮三個字袁世凱知他是外部待郎與己同僚且屬心腹今乘夜到來必有事故立即傳請進來門子去後不多時已見汪大燮來到廳子裏時袁世凱腳患已經略痊汪大燮仍不免問句安好然後分賓主坐下袁世凱道足下深夜到來必有賜教汪大燮道現在蘇杭甬路事前經讓由英人興築已立了草合同也曾經盛杏蓀請英人廢約奈英人不允還照會前來請修改正約此是大人知道的惟蘇杭人苦苦不允紛紛打電到來力爭你道怎麽樣辦法才好袁世凱道辦外交的很有點難處論起這草約本有廢棄的道理況外人又遷延日久還不興工似無怪國民不肯承認但國家裏頭勢力現在微弱若外人不再來索取權利已是萬幸了還那裏好把已經讓出的爭回兄弟只怕失了外人之心便是此事不生出意外怕仍要惜點事決裂起來就不是耍的據小弟愚見總要想個兩面俱圓之法可令國民滿意不致令外人動氣使彼此仍敦睦誼免因此事失了感情是最好的汪大燮聽了道大人的話很是但此兩面俱圓之法卻是不易稍有一點吃虧便貽國民口實小弟實不敢自主不知大人幾時銷假到部辦事呢袁世凱道現在腳疾已好些待假滿必銷假了此事盡有日子辦理不知足下深夜到來究是何意汪大燮道只爲英使明天到部商議故先來向大人請教本欲向大人籌個辦法今大人既日間銷假小弟便不多言當回復英使待大人假滿時再商罷袁世凱道如老兄有高見也不妨直說汪大燮道不如免使英人修築改爲與英人惜款自辦這樣也算廢了草約又算是自辦可免得國民藉口且與英人借款又不致令英人過不去此即是大人說的兩面俱圓之法大人以爲何如袁世凱聽了點點頭隨道待弟假滿後再商罷汪大燮說兩聲是是即辭去了正是欲向洋商籌路款頓教民庶起風潮要知後事如何且聽下回分解第廿一回拒借款汪大燮出差遭大喪袁尚書入衛話說汪大燮說稱與英人借款自辦作爲廢了草合同袁世凱亦以此說爲是然自汪大燮去後袁世凱滿意於銷假後到部辦事即照此議做去但念雖然與英人借款只怕蘇浙人士仍要反抗終沒有了期總要尋點法子令蘇浙人士說不得後話才是故於到部之後即與汪大燮商議道現在外交種種棘手國民總不諒我們艱難只望外人不再索權利就罷那裏能夠把已讓的權利收回今足下所議改爲借款一層自是善法因前者督辦大臣盛宣懷辦事不大妥當以至於此今除了改爲借款一層再沒善法了但怕蘇浙人仍有後言總要想個法子令蘇浙兩省人依從了之後不能反悔才好汪大燮道大人之言實見得到惟是國民之心不審交涉的煩難只稱力爭權利堅持到底怕借款一層國民依然不允又將奈何計不如先與英人商妥借款然後告知蘇浙兩省如再有反抗風潮只說已經商妥不能再議便是袁世凱道這恐不能怕那時國民又說我們掩住國民耳目暗地把國權斷送了今不如仍告知蘇浙人以惜款一層爲轉圜辦法叫蘇浙人磋議如何且現在蘇浙人大股未集借款兩字或可從允汪大燮仍不以爲然躊躇道若叫蘇浙人磋議怕國民只把爭回權利四字做口頭禪一經會議人多口雜又易反抗以小弟愚見今蘇浙人爲爭回路權四字已立了團體不如電致他們叫他們選舉代表來京與我們同見英使會商待他們到京時然後曉以利害說稱惜款一層爲不得已之辦法再不能更改的較易妥當袁世凱即點頭說了兩聲是滿意即行電致蘇浙人士使選舉代表來京會議不想借款築路的辦法自汪大燮見過英使之後新聞已傳遍了直弄得汪大燮等遮隱不得即告知袁世凱袁世凱亦大怒以爲國家交涉重事未有成議的只有點風聲即被新聞紙傳播辦事更大難了汪大燮便一力慫恿請袁世凱立即要籌個限制報館的善法但當時已傳出借款一事料不能隱諱因此把電致蘇浙人士的電文聲明已改議借款修築蘇杭甬鐵路即廢了從前草合同並叫蘇漸人士無論如何請即派兩省代表來京與英使會議這等語不料蘇浙人士得了這道電文無不譁然以爲借款築路以路抵押將來興工行車購物及一切用人行政都是受制於他人是名爲自辦實不是自辦的了就中就有爭路爲首的幾個人立開大會研究此事並請了在籍前任大學士王文韶及前任巡撫陸元鼎出來大家會議以外部以自己股本未集爲詞主張借款今一面先行集股一面於本省選舉總理人決意自行築路仍恐外部以爲叫自己派代表入京自己如不派時反爲外部藉口故仍又一面選派代表聲明代表人的許可權只合會議廢約於惜款築路一層亦不承認那時外部袁汪兩人真無可如何且浙人當先行集股之時旬日之間已得銀數百萬即行電告外部以國民附股踴躍決意自辦又請王文韶電告軍機請代奏以漸人自辦實有力量不願借款恰那時陸元鼎方應召入京故又請陸元鼎面奏草約應廢並以汪大燮爲浙人竟抗違輿論主張借款因此又宣佈不認汪大燮爲浙人並電請軍機革汪大燮以謝天下這等事情直弄得汪大燮無法只望代表到京把個爲難的情形向代表細說或可以遷就不提防等到代表到京之時那些代表員到了外務部那袁世凱以爲汪大燮是個浙江人于代表員必有點感情說話較易故令汪大燮與代表員相見准各代表員到部時見了汪大燮已爲眼中釘刺更說不下去並說道袁軍機是本部尚書所有交涉是他主政應請他面商才好汪大燮道袁軍機現在身子不大快暢難以見客若各位同鄉先生有什麽賜教即向兄弟面談自可以轉達的了各代表員道弟等爲接到部電要派代表來京會議弟等不佞謬承選舉故不辭勞瘁以公事要緊千里來京只道袁軍機有高見賜教今反不得一面是著代表來京亦屬無用汪大燮道兄弟已承了袁尚書之命故敢出來與各位相晤倘若不見信待兄弟回復袁尚書便是各代表員道不是不見信只怕汪大人妥商之後袁尚書複有後言是此次已多費唇舌了就各代表員中有一人恐汪大燮不能下場亦不好意思即道如汪大人既得有袁尚書所囑若有高論亦可賜教但事須迅速因蘇浙已陸續集股故弟等來時定限留京十天便要回省複命故方才所言不過防與汪大人處談過之後又要再晤袁尚書太過耽擱時日于弟等實有不便如汪大人處既得有袁尚書意思准可賜教汪大燮道現在外交的煩難是列位同鄉知道的此案的錯誤全在盛宣懷糊塗留落這些首尾令我們棘手今外人只堅持不允廢約經交涉數次幾於舌敝唇焦仍相持不下若改爲借款自辦或可轉圜除此外亦再沒有辦法了各代表員道某等蒙鄉人推舉謬充代表所有權限只能商議廢約此外實非某等所敢與聞汪大燮道某亦何嘗不望廢約但外人堅持不允亦無可如何欲與之決裂又自度本國勢力不容易做到因此左右爲難窮于應付今所議雖爲借款但並非以路權抵押亦是自辦而已不知諸君何以堅執不允各代表員道縱不是以路權抵押但所購材料及聘用工師不得自由與失權何異汪大燮道諸君此言似乎近理惟有想不到處今中國製造未廣材料縱不購諸英國亦必購諸外人就以工程師而論中國人才尚少亦須向外國聘請是並無吃虧之處諸君當可釋疑各代表員道材料及工程師雖要靠外國但使權自我操材料可以擇價而購工程師亦可由我去留畢竟是不同的汪大燮道條約裏頭可訂明材料價值不能較別國尤貴即工程師如不稱職亦可由我開除如此並非受人挾制若謂借款要吃虧傭錢今我們已聲明經手的傭錢仍歸公司若謂借款必須納繳子息想自辦的股本亦何嘗不要納息諸君細細研究自可了然在兄弟非必把持以惜款爲是但於萬不得已之中故籌此一策況兩省股本未集今借款又得現成可以立刻興工借人之財以辦我之路有何不可各代表員道借款兩字流弊不可勝言倉猝間難以盡述總之損失權利實所不免若大人以集股艱難爲慮須知現在人情踴躍旬日之間已集得數百萬現今又分各府各縣擔任想股本是不難的汪大燮道有無流弊只看所訂條約何如耳各代表員道此話自然能說得出但歷來交涉時時說謹慎磋訂實沒一事不吃虧又安能保此條約必無流弊汪大燮道此亦諸君過慮耳且尤有一說諸君以爲人心踴躍集股自易但恐認股雖易交股就難了各代表見汪大燮說出此話以爲汪大燮太過小覰自己兩省心中不悅即道廣東人把粵漢鐵路爭回自辦瞬息間集股四五千萬難道蘇浙兩省之力就不及廣東一省不成汪大燮道這卻比不得廣東人以一時之氣像與岑春煊賭賽一般所以如此若尋常集股卻不容易各代表員道此次蘇浙人亦激於義憤集股亦未嘗不易汪大人處若不見信請准由商辦若辦事人集股不成任從治罪亦可汪大燮此時覺沒得可答只說道那有集股不成亦可治罪之理但外人苦苦不允廢約奈何代表員道此是草合同不是正約不要混說因草合同未經朝廷簽字不能作正以外人逾期不辦先自背約應可廢棄作爲無效汪大燮道我何嘗不知此理但自念國勢力弱一經決裂必須言戰實無可以抵禦之法各代表員道外國只系商人謀辦此路他政府未必爲之興師且他自背約公法上實說不去汪大燮道到今日的地位看我們中國的光景那裏說得公法各代表員至此見汪大燮苦苦以戰事恐嚇即道大人處所言非我們所敢參議戰和兩字自有政府裁度我們代表只爲路事而來所有權限只能與聞廢去草約餘外皆非我等許可權所及此說方才早已言明若大人見諒自是好事倘若不能我們惟有回省照複不必更說其他汪大燮此時覺不能再說下去即道不過彼此參酌並無別的諸位不必便回待我把諸位宗旨及所有權限向袁尚書細述然後再商便合各代表便即辭出回至寓裏暗忖今日聽得汪大燮言論全是把持只把外交煩難來推倭又只把戰事來恐嚇看將來一切什麽歸外人所辦及什麽借款自辦統通只是汪大燮把持若汪大燮不去此事終沒了期立即把相見問答情形寄複本省至此蘇浙人士皆嫉汪大燮以爲袁世凱的主意只系汪大燮一人播弄故又紛紛電致北京政府裏頭力斥汪大燮之非並申明代表員到京的許可權又攻擊汪大燮誤國媚外速宜治罪等語弄得汪大燮手足無措隨後各代表員以此事終難轉圜因汪大燮並不言及可以自辦的話屈計十天期限已滿只得函告外部要如期回省即附輪南返那汪大燮老羞成怒轉向袁世凱面前說許多蘇浙人的壞話反令袁世凱憤怒因誤國媚外這一句話汪大燮也指是蘇浙人謾駡袁世凱的那袁世凱安得不怒因此不免堅持借款自辦一議後來畢竟民氣難抗英人又肯順些情把此件交涉放下了朝廷又知汪大燮爲國民仇視即把汪大燮離開外部派爲出使英國考查憲政大臣使離開北京所以當時蘇浙的人又不免多集怨于袁世凱這都是後話倒不必細表單表袁世凱自任外部尚書軍機大臣最後一年正是光緒三十四年那時光緒帝日在病鄉到了初冬時候病勢更重也聘過幾個禦醫請脈終不見有點起色偏又事有湊巧到那時清太后又染了一病頗覺沈重也到頤和園養病去了那時兩宮既病故十月內一連十數天也沒有視朝偏到十月二十一那一天光緒帝竟一病不起當時宮中不免紛亂因光緒帝登位之時論起昭穆本有些不合因同治帝歿時也沒有儲君就以光緒帝人嗣不過仿兄終弟及之制故當時就有人議論以爲同治帝沒時應立同治帝的侄子方爲合法今仿兄終弟及之理與當朝家法不合不過太后以若立同治弟的侄子就須立恭親王的孫兒怕恭王當權實於自己不便是以改立光緒帝這樣全是當時太后的私意爲自己執權起見又因故立光緒帝之時先把同治帝的死事隱住了早令恭王查勘萬年吉地使他先離了京城然後令直督李鴻章帶兵鎮住北京方才將光緒帝登位的有這個形迹益令人思疑是以當時大臣紛紛入奏更有一個吏部稽勳司主事吳可讀遞了一本奏摺即行自盡這樣喚做屍諫他折內的大意以爲光緒不應登位將來必成個爭立之禍雖太后諭旨中有說明待光緒帝生有太子然後入繼同治這等語但若光緒帝一旦無子將來必紛紛爭訟故請當時太后不宜一誤再誤當先立那一人爲同治承繼的待光緒身後即行即位以免爭端果然被他說中了到光緒帝於三十四年十月二十一那天歿時竟然無子清太后憶起吳可讀一奏又因那時恭王一派人甚盛容易爭立故清太后一意要立光緒帝的侄子總須一人入宮坐鎮才好猛想起當時朝中惟袁世凱一人最有機變就令人官護衛正是嗣位既思扶幼主鎮宮還要靠權臣要知後事如何且聽下回分解第廿二回請訓政鐵良惑宮禁遭讒言袁氏遁山林話說因那時清帝病故朝廷恐諸貴族爲變思召一重臣入衛因當時慶王亦不在京實國慶王掌執大權已久恐他於嗣位問題有所梗議故學從前遣發恭王的手段借查勘萬年吉地之名先令慶王領差出京那時軍機中人除了慶王之外就算袁世凱是有權有勢的故就令袁世凱入宮護衛並商議大事不想清太后正籌思嗣位問題又在病中勢方劇烈到次日清太后又一病身故還虧清太后早傳下遺詔以醇王的長子溥儀入繼大位那醇王本是光緒的胞弟故溥儀就是光緒的嫡侄子論理本該擇立但這會擇立的法子於光緒帝名下只是兼祧于同治帝的名下方爲承嗣若就承嗣同治帝說起來又不止溥儀一人方爲合式故清太后傳下遺詔時實大費躊躇只一面令袁世凱入宮又一面與醇王商酌立定了主意以傅儀入嗣及到次日清太后歿時京中謠言更多因帝後俱亡相隔只是一天有此湊巧自然令人疑惑有說光緒帝死於非命的又有說先太后實死於非命的更有說光緒帝已死了數天不過到那時方行開喪的你一言我一語京中內外倒是一般說法惟有一點奇處因各國駐京公使電報各本國又稱清太后死之在前光緒死之在後與前說大爲相反更有湊巧的當時拿了幾個太監諭旨道他是干涉朝政因此更有人傳道先太后那日在南海小禦輪中夜裏被一個太監不知何故用槍擊中了左腿傷重致斃的故把那夜值差的太監盡行拿了治罪所稱因太監干涉朝政只是一種托詞這等語諸說紛紛莫衷一是但就外國人所傳的說起來是太后先死還是近理然究不過是忖惻之言也沒什麽憑據倒不必細表且說當時醇王正在軍機行走因宮廷遭此大變自然在宮內商妥立了自己兒子登位然後把哀詔來宣佈在醇王本與袁世凱有點意見因前年議創內閣的事曾用槍擊袁世凱此事本來刻未忘心今偏召袁世凱護衛只是太后的主意自己自不好阻他還幸袁世凱亦是扶助擇立溥儀的因此把前時意見本已消化了不想那時鐵良正在做陸軍部尚書覬覦政權已非一日惟心中最恨袁世凱一人年前因爲爭掌兵權已多次衝突今只望光緒歿後袁世凱或失了權勢自己才好謀入軍機不提防嗣位大事有許多宗室大臣也不召進宮中商議偏召袁世凱一人心中就不舒服又怕新皇登位念他援立之功更加重用可不是他的權勢更要大起來便召集自己心腹的幾人如學部尚書榮慶及學部侍郎寶熙與及陸軍部參議良弼會議對待之策那時良弼以鐵良得掌兵權實出自他的手段弄來今因不遷其官已含恨鐵良不已惟外面仍與鐵良周旋故鐵良全不覺得當下會議對待袁世凱寶熙道今袁某入宮護衛且與聞嗣位大事顯有援立之功料不能說他不好今諭旨已將太后追封的爲大行太皇太后而光緒後又已封爲皇太后自咸豐以後向由太后垂簾聽政今改以醇王做監國攝政料非新太后所喜歡今不如密進宮中恭請新太后垂簾如此議能行可料醇王失了權勢那時新太后必感我們扶他聽政自然用我們掌執政權便可在新太后跟前說先太后奪先帝政權之故系袁世凱當戊戌一案從中播弄這樣不怕新太后不治袁世凱之罪是一舉而兩得也榮慶道此計大妙即是一矢貫雙雕一來我們可以同進軍機二來又泄袁世凱之恨若是不然不特我們沒有掌執政權之日且將來援立功大袁世凱將越加重用即越有權勢實是我們眼中釘刺而已鐵良道豪傑之士所見略同我亦以此策爲最妙但何以進言于新太后之前且言了又安能得他必允實屬有點難處寶熙道有何難哉今停靈在內宮足下爲親貴大臣明日可人宮致祭就向新太后說有要事密奏新太后自然要設法密召足下入宮自可以暢言且若以醇王攝政便權在醇王若由太后垂簾即權在太后亦沒有不從的道理鐵良聽罷大喜座中惟良弼不發一言到了次日鐵良即獨進宮祭靈覰醇王及袁世凱不在左右即向新太後面稱有要事要密奏那時新太后聽得正不知有何要事只道宗室近支有謀爭大位的事便令太監引鐵良轉至別宮面奏鐵良見了新太后請過安後新太后道外間有何要事可面奏將來也不必徇隱鐵良奏道先帝不幸賓天臣等正不勝哀掉但念先帝非不雄材大略只以權不由己遂致政不能發施今皇太后不宜複蹈故轍宜自主掌大權以竟先帝之志惟先太后遺詔以醇王監國似非不佳但醇王年輕性躁究不如太后之睿智聰明故臣等多人意見相同欲請皇太后垂簾訓政昨夜與學部堂官榮慶寶熙等相商皆以此策爲最要迫臣人宮面奏如蒙皇太后俞允臣等必竭忠相輔以圖自強新太后聽了意亦稍動但以遺詔既以醇王監國若自己一旦垂簾便與遺詔相背固懼諸臣不服且恐醇王不肯相讓那時宗室親貴必以自己與遺詔爭權亦斷不助己此事看來怕不易行故此心中躊躇不決便向鐵良面諭道卿言亦有理但遺詔已定不易更改此事容我細想之倘若可行必從汝請今宮中耳目較多不便多說汝宜早退鐵良此時已不敢再留惟頻瀕行時仍再奏道太後宜自打算勿遲疑誤事倘太后允行料諸臣必不敢抗若有面諭之件請隨時召臣進宮俾得面聽聖訓說了即行辭出即把面奏情形對榮慶等說知以爲新太后盡有些意思當可允准正喜不自勝惟當時新太后細想此事行之不易恐勉強要做反鬧出亂事來因此不敢就把鐵良所奏的話已按下了再不提起那時鐵良一天望一天終不見太后再召自己進宮議事再過三兩日仍無消息料知此次願望一定落空心中反不免彷徨起來因恐此議一泄以太后垂簾必奪了醇王權勢若被醇王知道是自己請諸新太后的必怒責自己那時欲謀陷袁世凱反爲袁世凱所乘自己反弄個不了如何是好即急與榮慶寶熙等計議連榮慶寶熙二人亦驚慌起來轉問良弼有何解救之法良弼道此策不是我主張的我那裏覓得解救的法子來不要問我罷鐵良道彼此都是同心的人你爲何說此話良弼聽了惟低頭不語此時鐵良亦不暇多責良弼只要與榮慶寶熙商議計策寶熙道我們所仇恨的只是袁世凱一人因他並不是我們親貴的競把大權落在他手上是以不服若我們失敗便是袁世凱更爲得勢我們斷不甘心今不如反言袁世凱密請新太后垂簾以奪醇王攝政在醇王跟前說這些話那時醇王必怒怒則罪袁世凱必矣足下以爲然否鐵良道只怕醇王不信榮慶道年前因議建內閣的事醇王曾欲擊袁世凱是袁世凱爲醇王仇嫉久矣由此進言不患醇王不聽且自兩宮歿後袁世凱日在宮中謂他進言于新太后之前亦近情理此策盡可行之時鐵良聽到這衛亦以爲然那日鐵良見了攝政王便奏道那一天袁世凱在宮曾與新太后密談監國殿下究知其事否攝政王道予一概不知那袁世凱是說什麽事要向太后密奏你有聽得沒有鐵良道此話臣實不敢多言臣以爲殿下在宮中早已知得故以言及攝政王道連日我一頭要理兩宮大喪一頭又打點新皇即位宮內瑣事也沒有閒心查究你若有所聞不妨直說鐵良故作半吞半吐隨道聞袁世凱密奏新太后以新皇得嗣大統本非先太后主意不過殿下劫先太后留此遺詔以圖子爲天子己執大權而已且謂殿下在太后跟前說稱新皇實繼承同治皇帝于大行皇帝不過兼祧就謂新太后不宜過問國政等語故新太后當時大怒袁世凱就力請新太后垂簾像先太后故事自行訓政並言與慶王爺商妥必竭忠相輔以佐新太后務達垂簾的目的後來新太后不知因什麽事不允准行臣卻未曉今只直陳于殿下之前望殿下總要秘密查察方好那攝政王本是個少年氣盛之人世事閱曆還少故聽得鐵良之語正如怒火交飛沖冠而出徐道你從那裏聽得來鐵良聽了此問幾乎對答不出乃故作難言之狀攝政王複催他直說鐵良道宮內太監多有聽得的且袁世凱在臣跟前亦說過以新太后訓政爲宜臣料此事是不假的攝政王至此更怒不可遏即道新皇人嗣大統及我得任監國當時袁世凱亦在場贊成他如何一旦說這些話鐵良道他性情最狡定然一面巴結殿下一面又欲巴結新太后以圖攬權固寵因殿下嚴明他不易作弄實則欲得新太后垂簾以圖自便久矣殿下總宜留意攝政王道袁世凱那廝因從前議建內閣我曾反對他幾至用武想他仇恨在心放要謀算我亦未可定但他既如此可惡你道怎樣對付他才好鐵良道此等人多一天在朝即多一天爲患自應早一天設法殿下試想他並不是我們親貴中人那裏有真心來待我們呢故此人斷留不得至於如何懲治殿下自有權衡臣不敢擅擬攝政王道現在國恤期內不便治他的罪待過三月後再作區處時鐵良心中正懼自己所謀泄漏恨不得早一天譴發袁世凱方自安心故不時在攝政王跟前進言都是不利於袁世凱的在袁世凱亦知鐵良不利於己但他暗請太后垂簾之事推在自己身上實在不知且以新主既已登位又不知攝政王待自己的意見何如故先具了一折自稱足疾即請辭退因袁世凱自念自己所恃的只是慶王今慶王的權力已不像從前自己實木可急流勇退若一旦被監國開了疑忌之心實在不了故先遞這一折志在探攝政王的意見不想此折一上攝政王並不曾商諸軍機立即發旨准其開缺回籍那旨先到軍機裏頭軍機中人無不大驚交相替袁世凱向攝政王說情那攝政王卻向諸軍機道你們倒不必替他說話我准他開缺已便宜他的了諸軍機又不知鐵良構陷之事只疑攝政王所說不知袁世凱有什麽罪名更不敢置喙袁世凱得了這點消息亦只疑攝政王因前者爭建內閣懷了意見想他如此量小自己在朝亦是不便即立刻出京從前知己都不往拜辭只往慶王處一談相與太息一會而別即搭車回河南項城本籍可歎一世煊赫如此下場後來攝政王亦漸知請太后垂簾之事只是鐵良所爲推在袁世凱身上此時已悔之不及後又因東三省交涉棘手被日人調兵間島賺取南滿路權京中各員都道如袁世凱在日斷無此事因袁世凱任外部時頗有點聲望爲外人畏服滇弁槍斃法員一事被法使要索革錫良賠重款求礦務聲勢洶洶不數日間已由袁世凱得和平了結因此之故攝政王也思念袁世凱上來恨鐵良造作讒言自己誤信也不好告人二來又見時事艱難非袁世凱無以支援大局便欲起用袁世凱惟袁世凱以時局不易挽救同僚又未可共事監國又多疑且自己開缺之後不一月又革去自己的所用的陳壁故袁世凱益發灰心只勸其子方任農工商部的袁克定小心服官自己已誓不復出只在衛輝經營園林爲終老之計已屢召不起雲
