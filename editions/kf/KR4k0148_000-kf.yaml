防各省內亂乘機泄發二來又防兩國交戰必有一敗也防敗兵闌人中立之境因此之故直隸一省是個緊要的去處因直隸與奉天本屬毗連的地方那一國敗時最易闌入的恰袁世凱正任北洋直隸總督這個嚴守中立的責任正在他身上比別省督撫更自不同那袁世凱一面人京與軍機中人計議又經召見過由朝廷詢問中立政策袁世凱早把胸中算定的奏對過了然後回任辦事還幸當時已練成新軍洋操隊足有四鎮之多計不下四萬餘人都是參仿德國與日本的陸軍制度練成的又經聘任日本軍官做顧問訓練了多年盡堪保衛地方不似從前軍隊的腐敗習氣故袁世凱當這個時候自信中立兩個字可籌辦得來又因早上已忖知日俄交涉必至決裂就請朝廷先照會日俄兩國公使自稱日俄若有戰事己國必守嚴正中立但從那處地方駐守總要劃清那一處是交戰地那一處是中立地才有把握因此次中國中立與別國中立不同在別國中立只不要興兵助戰又不要把軍火暗中輸給那交戰國便是完全中立惟中國與日俄戰爭實有關係那交戰地既在東三省本是中國的轄土論起別國在己國交戰本是千古罕有的且交戰地與直隸相鄰稍一不慎怕容易把中立破壞了故劃清戰地實是少不得的自袁世凱發出這個議論政府中人皆以爲然所以先分定遼河爲界遼河以東是交戰地遼河以西是中立地早已分得清楚袁世凱便令提督馬玉昆領本部人馬出鎮瀋陽又令統制段祺瑞在本鎮抽調十營駐紮錦州又令統制張懷芝在本鎮抽調數營同往錦州助守一面又令馬玉昆分兵駐守熱河以上各路都與戰地相鄰的先發重兵駐守以免敗兵闌人又令二三四各鎮新軍管帶官各在本鎮抽調數營幫守榆關朝陽兩處計自瀋陽榆關熱河朝陽各路防兵都歸馬玉昆節制因當時馬玉昆系直隸本省提督且稱爲淮軍的宿將自改練新軍之後他部下已盡改了洋操在中國裏頭算是能戰的故上年朝廷加恩賞他一件黃馬褂並加他一個太子少保的官銜有這個名位自然由他節制各路況他又在直隸多年地勢既熟是以袁世凱用著他又忖自甲午庚子之後各軍營都畏忌洋人的厲害恐這會中立稍有畏怯即不能嚴正緊守是以馬玉昆領兵啓程時袁世凱即囑咐他道這一會出兵雖不是與外國交戰但稍有參差即貽外人口實務須守著公法倘有敗兵過來不必畏忌洋人稍有饒讓你們只照此做去日後有事即由本部堂擔任便是馬玉昆得了袁世凱之令領兵去了餘外發出關外駐守的都陸續先行出發袁世凱又令統制官王仕珍將本鎮人馬一半駐守保定一半調出天津駐守時提督姜桂題方駐軍南苑袁世凱更令他抽調數營前來助守保定若都統鳳山也令他助守天津更令道員趙秉鈞督令警兵在天津縝密巡邏亦令段芝貴統率警兵巡守保定其餘各鎮協統管帶官或二三營或四五營不等都分頭派差如河間宛平欒州西河及通州開平等處都分兵駐守又恐日俄戰後兩國水師不知誰勝誰負或有戰敗的戰船逃至故又令北洋各水師將官將北洋所有巡艦炮艦水雷都次第召集分頭在煙臺大沽秦皇島等處防守自各處調派停妥所有值差將官都先後到袁世凱處領過軍令各自開差而去果然將直隸那幾鎮新練的陸軍分發清楚各路搭配完全自京中南苑通州以至直隸全省都把兵馬布得鐵桶相似去後袁世凱才把所有辦理中立派駐各路防守情形詳奏朝裏清廷見得袁世凱這會調度很有方法也十分嘉許一面降旨褒贊袁世凱並著袁世凱隨時留心督率各路不在話下單說袁世凱自辦理中立軍將各鎮分駐妥當之後京中皆以袁世凱有才調動很有法度惟是有些權貴見外自榆關內至南苑皆是袁世凱兵權所及且一旦有事轉手間即調動如意無不得宜因此也不免有些猜忌自不消說果然經過日俄戰爭陸路如錦州瀋陽一帶從不曾有敗兵闌人水路雖有俄國敗走的炮艦水雷逃入秦皇島地方倒被北洋水師留下所以附近遼西地方俄國屢思破壞中立倒無從入手當時中外人士也讚頌中國中立十分嚴正這都是袁世凱的功勞所以事後論功自然以袁世凱居首就賞他一個太子少保的官銜自此有些權貴更爲不服每欲分袁世凱的兵權那袁世凱也聽得這點風聲益發收羅物望但當時自榮祿沒後早是慶王當國所以文武大小各許可權都在慶王手上袁世凱細想自己官高權重處著這個地位實不得不小心故一面尋個機會要交歡慶王恰有一位姓楊的喚做仕驤向在慶王之府裏十分信任那時正放了直隸道員那袁世凱一來見楊仕驤辦事有點才幹就奏保他升任了臬司即由他介紹結交了慶王投拜在他門下那慶王雖居大位惟是以懿親見用並無才幹只如木偶因見袁世凱有點才幹又反喜歡得袁世凱在自己門下凡事有個倚賴因此也與袁世凱十分相得袁氏更借慶王的勢力行自己的權勢任是京中權貴怎樣猜疑也奈何袁世凱不得光陰荏苒又過年餘自袁世凱有了權勢那時一般國民凡有點思想的都望袁世凱有什麽改革舉動因他自巴結上慶王之後一力收攬人才又攘奪權勢最近如開平礦也令張翼與英人構訟爭回自己手上管理其餘電報局亦收回在自己手上至於官商合辦的招商局那總局本在上海地方的他亦要爭回作自己許可權所及此外無論什麽事凡有一點有用的也要歸北洋管轄這些舉動官場中自然側目惟在國民眼中看來反疑他一味攬權定有個用意及見他依附了慶王並無替國民營求幸福的思想他除了自己爭權固位之外也無他事倒不免把一片希望袁世凱的也心灰意冷那些黨人自不免要謀個反動起來要對付袁世凱那人那時先有一人姓張名惠的也與一友喚做郖重光卻同在北洋一間學堂肄業數年來都是同心同志那張惠向來亦只是一個愚直的人自看了幾家報紙又被中外風潮激刺了就把腦筋移轉來天天說政府裏頭於政治是不能改良的就立意要謀起事恰與郖重光又同一樣志氣故在學堂裏不過三兩年間就辭了出來天天只與秘密黨來往那一日張惠卻尋郖重光說道當初只道那袁總督將有一番舉動今他只知道自己爭權爭勢只替朝廷練好幾鎮兵好保全家產至若是國民權利同胞幸福也總不計了我們不對付了他只留多幾個民賊罷了不知足下尊意若何郖重光道足下說的很是但單是對付了那袁氏一人究竟沒什麽好處若對付了他能乘機幹一件大事出來還好張惠道不差現在東洋那裏也有幾人回來是要謀此事的我們益發與他同謀罷榻重光道這怕還要三思因北洋是陸軍菁華所聚的怕這邊起事後不多時也大兵雲集了這時卻不能不解散還恐一身難保似屬無益張惠道然則足下直是一個畏死的人了郖重光道足下不是這樣說弟並非畏死只是死也要死得值若明知幹不來必從這裏做去小弟卻不放心在小弟之意不過籌個長策並不是要阻撓足下足下休要誤會才好張惠道老兄是謹慎一點推據你又有什麽高見不妨直說郖重光道現在軍隊裏頭還有幾個是小弟相識的日來已向他運動運動欲行宋太祖黃袍加身的故事逼起袁總督來幹這件事你道好不好呢張惠道這個計算若能做得來自是上上的好計因袁督有偌大兵權他的部下又最服他的一旦號令起來沒有不從的只怕不容易幹得依弟愚見做事總要縝密些因運動軍界裏頭只怕中途反侮要倒轉了槍頭要將我們拿捕實不可不防郖重光道這個何消說得待弟慢慢見過幾個同志商量商量看可行不可行然後打算張惠答聲是自此兩人也分頭秘密運動恰那時東洋有十數學生回來亦謀幹此事的故天津一帶也天天有黨人密議因此風聲傳出實不好聽都道有黨人在直隸北京要謀起事這點風聲傳到袁世凱耳朵裏也不大以爲然倒當屬下各員打草驚蛇不免捕風捉影但見人言嘖嘖先後到轅稟報的已有數人也不能置之不理便紮下天津警局及各武弁一體嚴防那時北京裏頭亦有點風聲不好也紛紛派員訪察因此自北京以至津沽都四派偵探凡往來輪船及客寓都不時查搜更防有軍火運人便是起貨物時也認真檢驗故弄得天津一帶倒人心惶惶那時黨人見風聲已泄已知道事有不妙惟幸並無軍火運到以爲無什麽憑據故仍自安心惟是那些偵探員卻管不得許多凡是形迹可疑的倒要拘去至於並無事業只三群五隊不時在旅邸出進的也要拘拿以爲縱使錯拿了人也沒甚麽罪過正要多拿些人好博得成讞便是大大的功勞所以在天津地方見張惠等一干人倒穿著學堂裝束早已疑他是個黨人故一舉一動也覰著他更有從前與他同學的那時已在政界裏頭早知道張惠的志氣因更見他不時秘密聚會就思疑起來竟把張惠等二十餘人一併拘去了正是莫道血紅能染頂不分皂白也拘人要知後事如何且聽下回分解第十五回疚家庭介弟陳書論國仇學生寄柬話說張惠等二十人既然被拘自己且不知道因何致事情泄漏但到此時亦無得可說仍當自己是並無憑據即被訊時亦難斷人自己之罪也不想到三木之下何求不得當下偵探員把二十人解交警局羈押待訊那時總辦警局的正是段道芝貴當即到轅請見袁世凱要稟報此事袁世凱接進裏面段芝貴即把拿獲革党張惠等二十人一事稟稱請示辦法袁世凱道可曾有訊過不曾段芝貴道正在拿獲方擇期開訊不過先來稟報請示辦法未得大帥命令發交那處審辦卻不敢擅行開訊袁世凱道既不曾訊過你從那裏知得他是革黨呢段芝貴聽得此話愕然也無可對答覺袁督此話亦屬有理想了想才答道人言嘖嘖都道他形迹可疑是以拘他想亦拘他不錯待一經開訊便知分曉袁世凱道人言不足成讞若只從形迹上求他罪名必至弄成冤獄事關人命你們總要謹慎些若一心一意要當他是革党然後用刑求他實在大誤你們慎勿存一點僥倖功勞的心況使確是黨人亦不必株連太過方今風潮如此實在寒心只怕誤殺一次即多一次激變人心落得黨人藉口多方煽誘反足增黨人聲勢實不可不慮故你們益發要謹慎才好段芝貴聽罷覺此次自己到轅本一團盛意獻功以爲拿得二十人上司必然歡喜今袁督這一番議論實不大願興此獄便似一盆冷水從頭頂澆下來又不敢多辯只連答幾聲是是即行辭出回到局裏覺此番雖欲得功恐不免又成畫餅但費許多精神方獲得這二十人不特自己以爲有功即部下巡官巡士亦欲圖一個保舉看來此案便不宜落在直督手上便一力運動京中政界好提歸刑部審訊恰當時京中亦有風聲鶴唳亦曾派出偵探員到津密探的故刑部借風駛巾裏要尋一件事來做即令將所獲二十人解京訊辦直督自不好不從且樂得將這件黨獄離去自己手裏所以將二十人即提解入京那刑部立即訊了一堂內中有侃侃自承的亦有堅不吐實的亦有供稱委實冤枉不肯供認的不夠刑部堂上拿出幾件桁楊刀鋸早已一一認了時直督正欲移文刑部請他謹慎研訊後聞在堂上僅訊了一堂皆已認案現二十人不日即解回天津處決袁世凱聽得這點消息之時正在喝茶不覺一驚連茶盅也擲在地下卻說道怪極那二十人並非是起事時當場捉獲的只或在客寓或在學堂說他是形迹可疑就把來捕了難道個個倒有真正罪名的天下事斷無這般湊巧便是那二十人全是同黨也並有一事幹出來亦罪不至於殺縱使有可殺的那罪人亦該有個首從何至把二十人一併要處決呢說罷再令人打個電報入京問刑部將此案如何定法那刑部果然複稱二十人皆已認罪日內即行處決袁世凱見得是實又複往還電商請刑部分個首從那刑部又複稱案已定了不能更改袁世凱覺無可如何果然過了兩天已將張惠等二十人押回天津斬決去了袁世凱滿心不快只經過此事之後更觸宗室中人猜忌大抵除了慶王父子之外也沒一個滿意于袁世凱的那時袁世凱又兵權過重政府裏頭雖沒什麽舉動但有些要爭權的自然日伺袁世凱的破綻紛紛參劾因此就令他兄弟裏頭懷個履霜堅冰之懼恐防袁世凱一旦有什麽不測貽禍家庭因此他的兄弟袁世彤就把一封書寄遞袁世凱意欲諷他急流勇退的意思那書道四兄大人尊鑒竊以兄弟不同德自古有之歷歷可考者如大舜周公子文柳下惠司馬牛也聖賢尚有兄弟之變況平人乎讀棠棣之詩則必灑淚濕書弟亦有兄弟之感耳詩雲兄弟鬩于牆外禦其侮每有良朋也無戎此乃常人常事常情也若關乎君父之大義雖兄弟亦難相濟德異則相背大舜聖人也周公亦聖人也舜能感化傲象周公則誅管蔡舜與象爲骨肉之私嫌舜有天下不必加之誅討管蔡乃國家之公罪而周公不妨以大義滅親吾家數世忠良數世清德至兄則大失德矣二十年來之事均與先人相背朝中所劾者四百餘折皆痛言吾兄過惡吾兄撫心自問上何以對國家下何以對先人母親在生之日諄諄告戒于吾兄而兄置若罔聞將置母親之訓于何地兄能忠君孝親乃吾兄也不能忠君孝親非吾兄也弟避兄歸隱故裏十年於茲矣前十年間或通信後十年片紙皆絕今關乎國家之政祖先之祀萬不能不以大義相責也自吾兄顯貴以後一人烹鼎衆人啜汁以弟獨處草茅避居僻壤功名富貴終不敢問津今則吾兄貴爲總督弟則賤爲匹夫非固爲矯情也蓋弟非無心者也兄于弟固不必過加親愛弟所于兄亦不敢妄有希求吾兄之愛弟與否固非所知弟所求無愧於己心而已弟挑燈織履供晨夕之助爨枕流漱石吸清泉以自如不特無求于兄亦無求於世也雖然清苦自安實榮于顯達苟不自愛弟亦不難隨與身敗名裂蓋使爲人指責日此爲某人之愛弟也某人之羽翼也某人之爪牙也弟此時自問將無以自處弟視大義如山嶽視富貴如浮雲惟守母親遺訓甘學孟節老于林下而已昔者己亥之壽弟曾上親供于護理河南巡撫景月汀請他轉稟榮相日朝中無有能制吾兄之人若解其兵柄調京供職固所以存兄實所以存功臣之後也云云其言昭昭如在目前自今以後但願蒼天有知祖先有靈吾兄痛改前非忠貞報國則先祖幸甚闔族幸甚臨紙揮淚書不盡言專此敬請近安六弟世彤頓首這一封書寄到袁世凱那裏袁世凱看罷只付之一笑凡有屬下官員到來投謁的都把這一封書遍給人看都詫異道令弟何以出此狂言實在不近情理袁世凱道我現在有四鎮兵權在手無怪人相疑但我若要反正時不在今日了外人觀我似乎結樹黨援但我用人亦因才而取若才不足用即親爲兄弟亦不能援引此吾弟所以積怨也今吾弟以孟獲待我而以孟節自處若果爲孟節自可終老布衣試問數年前他捐了一個道台卻是何意昔吾兄世敦在山東誤殺良民激成團黨之變因以革職吾兄弟頗謂我不爲兄設法然試問此等罪名豈能以私害公吾之結怨于兄弟者在此特今者吾弟之欲陷吾亦極矣說罷聞者倒爲歎息自此袁世凱把親弟之信逢人便說以爲吾弟此書必料自己匿不敢告人乃故意不爲隱諱但其中內外官員有信袁世凱必不至有異心的有疑袁世凱一味攬權俗語說相知莫如兄弟今其弟且作此話或者袁世凱真欲動彈亦未可定或疑或信自所不免惟有一二宗室中人便欲設法分袁世凱兵權在軍機裏頭開議設立一個練兵處派慶親王做了個督辦練兵大臣滿意要把袁世凱兵權要收回沃親王手上不意朝廷叠次見過各國公使凡談及練兵倒稱袁世凱最爲熟手今北洋陸軍既有了成效倘若在京中練兵自然少他不得了那日本公使見了慶王又說袁世凱練兵甚爲得法今設練兵處大要用袁世凱北洋相助這等說湊著慶王又不大懂得軍事的正樂得有人幫助況自己所靠的只是袁世凱便又請旨將袁世凱派爲練兵處會辦大臣那時一班宗室人員只道設了練兵處就可收回袁氏的兵權不想反令多一個兼差他手上幾鎮兵權依然無恙不免大失所望自然要籌第二個法子爲對待袁世凱之計自不消說單說袁世凱自再得練兵處會辦大臣的兼差屬下文武官員自必紛紛上衙道賀其中知己屬員更有些欲求練兵差使要求袁世凱說項的先是段芝貴到來道喜袁世凱道這事有何喜可賀段芝貴道不是如此說直隸雖密近北京但公究竟是個外任總督今京裏所設練兵處且不能缺公席位可見廷眷獨優安得不賀袁世凱道貴道有所不知此次練兵處之設立本不利於本部堂實欲借設練兵處之名爲收回北洋兵權之計惟慶璵我交情獨厚又見京中尚無可以代任兵權之人更以外人看見北洋陸軍成效力爲援薦故有是命足下試想窺伺者在前猜疑者在後吾斷不能持久每欲舍去此責任而廷意又不允因此窺伺猜忌者益多可知多一次優差即多一層危險故吾作是言此非足下所知也是以吾於練兵處會辦一差只願擁個虛名再不願薦人於其中貽人藉口許多到來欲求練兵差使是直未知吾意矣段芝貴聽罷深以爲然去後次日袁世凱獨自進京叩見慶王借辭去練兵處會辦之名欲探慶王之意慶王道足下誠有聰明京中蓋有欲得足下兵權者故多方設計然足下亦不必介意只宜勉力任事不必辭差以今日人物實非足下不足以掌兵權也袁世凱聽罷自然依慶王之意隨問慶王欲奪自己兵權者果屬何人慶王道此事本不宜多說足下既已問及又似不得不言鐵良每于召見時故意談及軍事惜炫己長以揭北洋陸軍之短且每與樞臣相見必談北洋陸軍訓練失宜即此可知其意吾不知彼有何能幹要替足下治兵日前設練兵處亦其面奏請行也袁世凱道王爺深居似未知官場積習他雖不諳兵事然近來收鳳山良粥二人爲爪牙將恃此二人爲挽綰兵權之計何必鐵良自有才幹方能爭權今在王爺面前實說請爲門下設法一則辭官歸裏以避賢路次則改調入京以卸兵權望王爺俯允慶王道汝年尚強壯正當爲國家出力何必遽萌退志汝回北洋只管辦汝事他人之事不必計較袁世凱聽罷稱謝而出回至直督衙門心未釋然力求所以解釋鐵良之忌即請楊仕驤相見告以慶王所言時楊仕驤方借袁世凱之力薦任直省藩司正恃袁世凱爲冰山自然力替袁世凱籌度袁世凱道據足下高見要如何處置才好楊仕驤道大人年壯力強位高權重宜爲人所忌且京內只有慶王爲大人心腹以外各軍機不是反對的忌大人權勢就是頑固的嫉大人行爲終亦可慮請借慶王爺之力薦一人入值軍機以爲自己內援實是要著余外尚書督撫不可無自己心腹之人蓋多一聲援即少一反對大人以爲然否在楊仕驤此話一來爲袁世凱計二來亦爲自己計好望袁督保升自己惟這些說話正中袁世凱之心聽罷深以爲然即道足下真是高見我當依此而行到次日入京謁見慶王正要薦人入值軍機細忖所薦之人若是自己心腹更惹人眼目若被自己所薦之人必然感激自己何患不爲自己所用恰那時初設學部想現任學部尚書的正是榮慶亦與自己有來往的不如薦他也好便向慶王道現在軍機辦事一切用人行政都是無甚成效皆由在樞垣的像王爺的剛決卻是罕有門下素知學部尚書榮慶心地光明舉動正大若以入值軍機行走必裨益不淺不知王爺以爲然否那時慶王正信用袁世凱凡袁世凱一言一語沒有不從的故聽了袁世凱之言自然首肯便力薦榮慶入了軍機那日諭旨頒出榮慶著在軍機大臣上行走榮慶正不知何以一旦得慶王如此相待當謝過思後即往拜晤慶王謝他援薦之德慶王道足下才幹敏達我所深知只自袁世凱一力遊揚足下始省起來援足下入樞垣去足下此後務求爲國盡力罷了榮慶此時方知自己爲袁世凱所援薦益發感激袁世凱那袁世凱又見軍機裏頭已有一半是自己心腹於是內而尚侍外而督撫都次第薦人充任不想聲勢愈大嫉忌愈多從旁觀看起來倒覺袁世凱當時地位似可危可懼因此便引出歐洲中國的留學生反注眼在袁世凱身上一來見他從前周旋義勇隊的代表及前時天津黨獄也不大以爲然二來又見他一味攬權樹黨只道他有個獨立思想湊著當時民黨的風潮一天膨脹一天以爲袁世凱有點意思不知袁世凱固是無此思想且他向做專制官吏便是獨立得來終不脫專制政治於國民斷無幸福也並不想到此層便聯合上了一封書寄繪袁世凱勸他獨立正是欲求大吏行奇舉幾見斯民得自由要知後事如何且聽下回分解第十六回贖青樓屬吏獻嬌姿憾黃泉美人悲薄命話說留學歐洲學生因袁世凱結樹黨援總攬權勢也疑他有什麽舉動又見他所處地位被宗室中人早懷了一個疑團以爲那姓袁的此時料是進退兩難之際若把一封書打動他不怕他不改轉念頭奮起雄心謀個自立便約了幾人先開一個秘密會議說起致書袁世凱勸他反正自立當下各學生聽得莫不以爲是就中一人喚做張紹曾起身說道自唐以來凡是藩鎮疆臣凡有權有勢的都以袁世凱爲最因曆朝見得漢末州牧唐末藩鎮都是尾大不掉也主張中央集權之治是以疆臣總受掣肘今那姓袁的如此舉動沒有不令人思疑的故近來政府裏頭也要行中央集權想爲那姓袁的起見意欲收他的權勢以免後患那袁世凱是有點聰明的人難道不知朝廷的用意想他一定有個主意的以弟愚見那姓袁的除了具折乞休就是舉兵行事方能于險裏求全若是不然怕他下場總是不好故這個時候打動他是最好的機會了又有一人說道好雖是好只怕那姓袁的沒有這般膽汁就不免徒勞筆墨也是枉然張紹曾道某料那姓袁的不是沒見識的人未必不知旁人思疑自己若不能釋疑又不能退休他自問除此之外更無保全之策慶王以七十老翁如殘年風燭能倚得幾時想他亦想及此層故此時打動他也最好便是打動不來我們亦無什麽不值不過費去幾分銀子的郵費罷了說罷各人都鼓掌稱善又以張紹曾發的議論很好就公推他做主稿張紹曾自不推辭即立將函稿擬就再會同修飾然後寄回中國北洋那裏直交督署袁世凱收覽不想那函寄到之時袁世凱恰進京裏便由幕裏老夫子接著看那函面並沒有寫是什麽人寄的又不像官場來往的文書只是由歐洲寄到料不是駐樣公使寄來的正不知函內所言何事便懷著一個鬼胎要窺探袁世凱的私事便收了那一函走回自己房子裏悄悄偷拆那函來看只見函內寫道慰亭督部足下某聞識時務者爲俊傑通機變者爲英雄足下以天縱之英才爲世而出一切審時度勢觀變沈機當不假仆談矣顧某以旁觀者清有不得不爲足下告者竊維中原板蕩垂垂百有餘歲撫有我土地奴隸我人民亦已至矣論者或以君位爲虛榮民權爲實際歐洲大陸且有迎異國人以爲君者苟得自由幸福亦又何求顧迎君者出於國民之公意承認而奉以爲君亡國者出於強敵之野心征服而兼併其國挈量比較殆類天淵此如可行則甲午之役庚子之役皆可任操縱於列強之手公等固不必糜民膏構和議爲朝家保全計也夫專制之酷邁于全球牛馬同胞不儕人類固已久矣而猶可以迎君相比例那年來盈廷囈語立憲立憲之名詞變法變法之聲浪遍唱於人間然而改換面目襲取皮耶僞耶早爲識者所哂足下洞識外情熟觀大勢真那僞耶此足下所知也十九世紀而降專制政體環球將無立足之地而欲以苴罅漏粉飾彌縫與列雄角競于弱肉強食之時愚者亦知其無濟而足下欲以一木之微支將傾之大廈片帆之影挽已倒之狂瀾也不亦惑乎昔令先尊君以一世之雄駐軍宿州抗撚酋於西北堵洪党于東南旁午軍書憂勞成疾其爲朝家效死力也至矣然而百戰之將位不過中丞賞不及封典而高坐養尊安居無事者王也公也侯也伯也車載斗量何可勝數嗟呼異姓之卿雖勳不錄尾大不掉久懸爲大防矣縻同胞之性命逐故國之山河以奉之於主先君九原有知將拊膺悔歎日道非其道愧不早爲劉因也功奢賞吝動輒招疑昔張廣泗柴大紀之徒以汗馬殊勳積封侯伯顧一言之忌斧鉞相隨況足下無昔人之烈而權重於當世者耶或以人臣事貳殆爲不忠舊學大師重爲箴訓獨時勢不同即強權互異藉使主權尚在當朝國勢尚侔各國可以守土可以保民則如足下等後先疏附之徒肫誠翊戴能以致國家于自強是足下等必能保殊勳至於永世全晚節以無有異心亦固其所然某觀於南北口岸之租割是有土地而不能保守也礦權路權之損失是有利權而不知保守也祖國之國權大去中土之主權複非只以羅雀掘鼠以贖保被征服國之君位殊榮對外則以賠款供輸對內則以專制殘殺日蹙百里將輾轉而日即於亡而足下猶欲擁護之何其昧也某等以爲今日非改革無以救亡方今種族昌明民情可見矣藉非國民主動必不足以實行立憲苟欲得將來之建設舍現在之破壞無他道焉今足下居要位執大權其所以致此者不過前倚榮祿後倚慶邸以爲援耳足下才華卓越高出同僚猶依附草木以致通顯公何委曲自苦且亦不知黃雀在前持彈者之日伺其後也軍營老散足下爲編練之政治腐敗足下爲爭改之竭盡愚誠反叢忌謗新軍方成兵權遽奪履霜堅冰足下曾一念及將來所有如何不測否耶在昔伐越成功伍員見殺沼吳奏凱文種受誅劉項之勝負既分韓彭之首領難保人亦有言狡兔死走狗烹飛鳥盡良弓藏古已如此況非我族類其心必異而足下欺倚以爲建殊功望奕祀今足下位高招尤後來禍福誠未可料爲足下計與其待罪不如奮起求全複故國之河山造同胞之幸福足下行之直反手事耳憶昔法倡革命實啓民權美苦煩苛乃倡獨立造世英雄華拿未遠某固不以庸庸厚福待足下而以造世英雄待足下也乃若以今較昔煩苛逾於美國專制甚于法人炎漢聲靈淹然澌滅如是久矣即足下能享優崇保富貴伈伈伣伣以待百年而塗炭水火普遍中原足下一人笑而萬姓哭足下豈亦安乎況復原鹿複危城狐自舞慘懷麥秀將召瓜分行使種族長沈山河永碎猶太往事人所同悲公亦人類應有感情念及前途杞憂何極不忖揣冒昧聊布區區足下圖之某謹白那幕友看罷覺這一封書直是勸袁世凱作亂的如何好給他看但若要埋沒了又怕那些留學生第二次有書來時提及此函袁督必問及此函何往這時如何是好便候袁世凱回時悄悄放在袁世凱坐處默窺那袁世凱看書後的動靜不想那袁世凱看了沈吟一會也並不將此函隱諱卻把來遍示幕友並笑說道旁人見本部堂有點權勢也疑我久有異心其實大誤某今日殆如騎虎難下一切舉動誠有不得已者旁人焉能知之說了各幕友都道大人公忠體國惟王爺所探知耳袁世凱一笑而罷惟袁世凱接得此函之後自忖那些留學生敢公然遞函於自己必自己舉動令人有可思疑之處因此要結慶王較前更甚慶王又複深信他的故于袁世凱無不言聽計從所以那些屬員一望升官求保舉的都向袁世凱面前弄法就中楊藩司見自己升任藩司已久滿望薦升巡撫益發要巴結袁世凱但金錢兩字是那袁世凱向不慣受的若單是禮物也防不見得自己誠意猛想起那姓袁的年方強盛後房姬妾不下一數人有是蒙古人女子的有是西藏的至於京中名優歌妓色色俱齊公餘之暇在後房中與姬妾團坐弦管大作實是一個風流跌蕩的人不如尋一個絕色的佳人獻他更留得永遠的紀念但各處佳人都是他後房所有只有蘇州南妓近來最爲京中大員所賞識就是王公貴胄也趨之若鶩凡是有聲有色的南妓一到京華即豔名更噪不如在蘇州買一個絕色的送到他處不怕他不承納那時節袁世凱自然與自己爲密切的交情即那個妓女得自己買得轉送上司得做一個大員的姨太太天幸得寵自然又感激自己不盡便打發一個心腹的家人喚做楊忠的攜資到上海地方訪尋有聲有色的名妓及楊忠到時凡花天酒地及唱書的館子都躡足其間志在物色佳人恰那日被朋友請宴幸得那位朋友替自己喚了一個美妓到來陪局喚做金媛媛的上年花榜發時早點過一名及第豔名久著及多長了一年已屆芳齡二九更出落得一種風流態度都道他到本年屆開放花榜之期他一定是個狀元人物不特儀容秀美且長挑身材修飾合度唱老生喉直像響遏行雲正是人間獨一天上無雙楊忠聽他唱一會曲子已覺神搖魄奪更看他眉如柳葉面似桃花益發傾倒便故意與金媛媛交歡又忖他在海上見過多少有名人物自己向在北洋卻不曾留過聲名于海上青樓因此也恐金媛媛瞧自己不在眼內便鋪擺自己的聲勢做什麽優差得什麽上司眷注說個不了席散之後乘著些酒意與友人直到金媛媛的寓裏談天先露些要攜他從良之意那金媛媛卻不大答應楊忠見得詫異次早把些銀子打賞她的使喚人娘兒們說明自己願出重資取贖金媛媛那娘兒道此事恐辦不到