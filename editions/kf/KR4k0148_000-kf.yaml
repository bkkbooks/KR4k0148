body:
  text: 宦海升沉錄清黃小配著目錄第一回入京華勳裔晉道台遊天津爵臣征幕府第二回監朝鮮使節趲遙程入京華群僚開大會第三回宴華園別友出京門電天津請兵平亂黨第四回爭韓政清日交兵策軍情袁氏返國第五回改電文革員遭重譴練軍營袁道拜私恩第六回談新政袁氏擢侍郎發私謀榮相興黨禍第七回革樞臣黨人臨菜市立阿哥天子入瀛台第八回附端王積仇騰謗語發伊犁送友論交情第九回蓄異志南省括資財勘參案上房通賄賂第十回墮欲海相國入迷途剿團党撫臣陳左道第十一回立盟約疆臣抗僞命獎殊勳撫帥授兼析第十二回離東島返國謁疆臣入北洋督衙擒刺客第十三回縱刺客贈款南歸對強鄰觀兵中立第十四回論中立諸將紀功興黨禍廿人流血第十五回疚家庭介弟陳書論國仇學生寄柬第十六回贖青樓屬吏獻嬌姿憾黃泉美人悲薄命第十七回爭內閣藩邱擊疆臣謀撫院道台獻歌妓第十八回出京門美人悲薄幸入樞垣疆吏卸兵權第十九回息風謠購槍驚各使被讒言具表卸兼差第二十回慶生辰蘭弟拜蘭兄籌借款國民責國賊第廿一回拒借款汪大燮出差遭大喪袁尚書入衛第廿二回請訓政鐵良惑宮禁遭讒言袁氏遁山林黃序世界一海蜃樓耶人生一黃粱夢耶忽焉而雲翔禁閣則心爲之歡忽焉而迹遁江湖則心爲之悲忽焉而膺九重之寵錫忽焉而遭孑身之放逐則境遇亦固人事之進退爲之或合而或離歡也悲也合也離也極世態之炎涼盡人情之冷暖彼身當其境者正不知顛倒無限英雄消磨多少權力矣而論世者滿肚牢騷與旁觀者一雙冷眼且摭拾其事實論列其品評而宣諸口焉而筆諸書焉相與歎息其時機感喟其命運甚且冷嘲焉熱諷焉而是之非之褒之貶之作清議之春秋編個人之綱鑒嗚呼噫嘻胡富貴功名風潮變幻一至於此此宦海升沉錄之所由作也雖然木槿繁花難禁暮落人生朝露勢不終日古今往來茫茫宦海作如是現耳果如是才者失其才智者失其智好者失其奸術者失其術今日下場去年回首覺昔之氣勢炎炎炙手可熱隨波逐浪漁父得而笑之又豈惟水流花飄而已耶然作者于此猶必運以奇警之心思繪以沈摯之筆墨歌也有懷哭也有淚其人其事近之在目前遠之極千古俾世之讀者亦忽焉而歡忽焉而悲忽焉而豔其合忽焉而憐其離蓋恍然於高官厚祿名動中外所爲媚朝家而忘種族者一旦冰山失勢其結局亦不過若斯也固亦宦海中人這惟一龜鑒徒以野史之無稽稗官之話本視之則淺矣化筆墨以煙雲渡慈航於苦海其有深意乎爰序於篇以告讀者宣統己酉季冬黃耀公序于香江寓公詩曰宦海無端起惡波功名富貴總南柯升平不事於城選鳥盡弓藏奈若何頻聞剖豆與分瓜願柱中流念太奢魏闕江湖今已矣怕回業眼望京華第一回入京華勳裔晉道台遊天津爵臣征幕府哈哈古人說得好道是狡兔死走狗烹飛鳥盡良弓藏這幾句話可不是春秋時伍子胥說的麽他說這幾句話都是有點子原故的因爲他由楚逃難走到吳國當時吳公子姬光要用他的本事謀取君位就了不得的敬重他果然伍子胥替姬光取了吳王之位又輔佐他破楚伐越成了大功附近各小國又來歸命吳國遂強盛不過霸于諸侯不想後來吳王貪圖美人重賂許越王勾踐成盟伍子胥知道勾踐之志不小將來必爲吳國之禍故此向吳王苦諫成仇吳王競惑於太宰伯嚭之言把伍於胥來殺害了他臨死時就說這幾句話見得要捕狡兔必用走狗要射飛鳥必用良弓若沒了狡兔飛鳥時這走狗及良弓就用不著的猶之國家有事就要用能臣及國家偶然沒事那些梟雄之主就懷了個妒忌之心差不多要把那能臣驅的驅殺的殺了你看劉邦朱元璋豈不是個雄才大略之君麽你道他後來待那些開國功臣究竟怎地呢在劉朱兩主是本國之人尚且如此何況伍於胥所仕的是異族之君麽呢說書的人不過引這一件故事做個引子不是與看官講東周列國的故事今不再說古事且說今事給諸君聽聽因今日仍有一個人頗像伍子胥的那人的出身立業雖不及伍子胥的英雄但講到兔死狗烹鳥盡弓藏八個字亦有些相類你道那人是誰卻是人人知得的就是我們中國裏頭河南省內項城縣一個故家子姓袁名世凱別號慰亭他父親喚做袁甲三本是清國一個中興功臣因咸豐初年西北一帶有張洛行苗沛霖起義聚衆數十萬攻城拔地甚爲聲勢當時的人號他做撚黨袁甲三卻輔佐清朝去攻剿他做到欽差大臣的地位駐紮宿州地方左攻右戰立下多少功勞故此清廷要把名器榮耀於他及到他歿時連他的子孫也有恩典蔭贈那袁甲三本有子數人世凱就是他的第四個兒子至於世敦世濂世輔世彤統通是袁世凱的兄弟行輩了且說袁世凱自咸豐九年出世後不久袁甲三也亡過清廷下了一道諭旨蔭恤他的子孫故袁世凱亦于及歲時到京引見清廷念他是個功臣之裔又因袁世凱早已捐了道員就交軍機處存記好像遇缺即放一般那袁世凱爲人是機警不過的自念先人在清國做了大官有許多功勞料然有許多同僚都是自己世交的正要尋一條門徑拜謁一兩個有位有勢的大員憑他扶助才易出身這時才不負自己志氣猛然想起正任直督北洋大臣爵相李鴻章也是與自己先父同事的那李鴻章是最有權勢的人若見他得他賞識不怕一官一差謀不到手裏想罷便直出天津因直督一缺一年中有半年駐於保定就有半年駐在天津恰那時直督正在天津駐紮故袁世凱一程到了天津地方先尋了住處忽聽得李鴻章正巡閱東明河工尚未回衙暗忖直如此湊巧惟這條門路是斷不宜放過的不如權住天津等候也好到了一日覺天時甚好就帶了跟人出外遊玩不覺到了紫竹林地方那紫竹林是天津有名的名勝到時但見得香輿寶馬綠女紅男人擁如雲車行似水不少墜鞭公子正花明柳媚之天許多走馬王孫趁日麗風和之地樓臺一寸錦檻千重每當美景良辰抵得賞心樂事當下袁世凱且行且看自忖人傳紫竹林熱鬧真是名不虛傳遊了一會穿了幾條曲徑前面現出亭子一座袁世凱正欲進亭子裏小住略歇些時忽見亭子先有一個人坐著舉頭細看見那人生得氣宇軒昂精神活潑有四十來歲的年紀頷下兩撇鬍子正用手左右撚捏旁邊立著兩個跟人一個正拿著京潮煙袋在旁遞煙袁世凱省起方才來時見門外一頂大轎子料然是此人的看他形容一定是本處官場不然就是一個大紳了便步進亭子裏向那人一揖通問姓名原來那人不是別人就是前翰林學士張佩綸當中法開戰之時曾拜欽差大臣辦理福建軍務的自從敗了仗回來革職之後在天津電報局當總辦之職當下張佩綸又向袁世凱問過姓名世凱答過了猛想起此人是北洋李爵相的子婿是李相最得用之人自己要謀見李相就先與他拉攏亦是妙事因此道出家世履歷張佩綸見他是世家也不覺起了敬意在亭子裏談了一會那張佩綸固是滿口才猶袁世凱亦是個口角春風的因此十分投機佩綸即預約請世凱明天到他處敍談姓袁的自無不應允不多時張佩綸說道兄弟不過經過這裏順便進來一遊現在有點事要回去了便起身告別而去那袁世凱亦是無心遊玩的今見無意中先識了張某心中已喜不自勝即帶同跟人回寓去了到了次日即依約前往拜會張佩綸佩綸也接進裏面坐下正在寒暄之間忽門上傳一個名刺袁世凱知是有客到來拜會理要回避惟張佩綸見世凱到了未久驟然送客覺不好意思即說道不必拘禮了來的是個不速之客只到來談天並沒有什麽公事袁世凱聽著就乘機稱謝只見佩綸傳出一個請字跟人應聲去了隨見來客進來大家讓座後張佩綸道座中統通是知己可不必客氣袁世凱與來客一齊說了兩聲是是來客即與世凱通過姓名原來來客就是天津海關龔道也是李爵相之甥子沒事時就天天到姓張那裏談天說地袁世凱見他又是李相姻親之人一發要與他結交佩綸即介面向龔道說道那位袁老哥就是前欽差大臣漕督袁公甲三的四公子正從北京引見回來的現在正把父執禮候見李中堂呢龔道聽了道一聲久抑又重新敘禮張佩綸道今天兩位來到很巧昨江南劉峴帥薦了一個廚子到來說是精於調味的兄弟今天正著他弄點菜試試兩位若不嫌棄待晚飯後回去不遲袁世凱正說了一聲不敢打攪龔道笑道奇怪奇怪劉峴帥難道是不知味的有了一個好廚子卻不自用要薦來老哥處不成張佩綸亦笑道兄弟還沒有說完呢因兄弟在南京曾九帥幕府時劉帥正歸隱林下常有書信譏九帥與兄弟依戀官階九帥常複他說南京是他舊治之地長江一帶海産豐美可供朵頤不似湘間絕無異味所以我們不欲離去江南又說那一物如何香美這一物如何甘脆問他還記憶否因劉帥平日最好談食品所以九帥調侃他到九帥臨終時也遺折薦劉帥出身先日還有信致劉帥道足下食指動否南京勝地將使足下複臨斯土以免向隅這等說你道九帥臨終時還作這般調笑的話你道奇不奇呢龔道笑道你真是糊塗的麽兄弟只問劉帥怎地有好廚子不自用要薦到老哥這裏不想你說了半天還是離題萬里的看來曾九帥不奇你還是真奇呢張佩綸又大笑道兄弟仍不曾說完呢後來劉帥得再任兩江惟他常性還不改常常與兄弟書信往來仍談論食品不休他前月函稱得了一個天字第一號的廚子函內稱千辛萬苦才得這廚子一用洋洋數百言只論這廚子的好處弄某菜用什麽好法弄某菜用什麽異味兄弟得接那函後向他借那廚子用三個月又發了幾次電報催他才得這廚子到來今天只是初到的第一天所以留兩位試試龔道又笑道你總辦電局便宜了爲借用一個廚子要發幾次電你方才說的兄弟幾乎聽不耐煩了兄弟還問一句老哥看你說話時這般遲慢因何你在福州時聽了炮聲卻又走得這般快當究是什麽原故呢這時龔道說完袁世凱在旁聽了龔道的話覺這幾句話是十分冒撞那姓張的實不好意思只道張姓的斷斷不喜歡不想張佩綸反大笑起來說道兄弟在福州時不過要做做欽差前去玩意兒罷了不提防法蘭西的兵官真個要放起炮來若不跑嗎這命就不要了龔道與袁世凱一同笑起來三人正談話間只見一個跟人又進來向張佩綸說道曾太太喚呢張佩綸聽著就飛奔去了只回頭向龔袁二人說道兩位等等兄弟不久出來相陪袁世凱見了覺有客在座如何有這等規矩正自忖度龔道笑道袁老哥也不必思疑只管坐罷這位曾太太喚他沒論天大的事情他也要放下不拘什麽王公卿相到會到這時他亦不能相陪的了袁世凱笑道有這等奇事龔道說道你還不知他自從先娶的李太太歿後在南京督幕時曾九帥鎮日誇獎自己女公子的文翰爲世所稀並說道除了張佩綸那文墨中就沒有一個是他女兒敵手的那日醉後竟對張佩綸說道我若把小女嫁了老夫子真是一個對兒可惜年紀不對可就沒得說了張兄就乘勢答道古人有忘年的朋友晚生不妨做個忘年夫妻大人你道是不是呢曾九帥那時醉了只一頭笑一頭點首張兄就當九帥點首是應允了即當席稱起翁婿來次日反悔不及曾家女兒更是啼哭不已後來幾多勸慰然後得曾家女兒允了你道那十來歲的小姐兒父親是當朝伯爵總督南洋自己又是一個有才貌的女子忽然嫁了一個四十來歲的人做個繼室那有不氣呢所以過門之後張兄總要百依百順於他沒一點是敢