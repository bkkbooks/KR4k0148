各領事亦願如此辦法因此便成了這盟約端王聽得也十分憤怒但各督撫已聯爲一氣究不能奈得一個袁世凱什麽何惟有竭力鼓舞團黨好望殺退外人自己就可以登其大寶自無人敢來干預因此更假託諭旨頒發巨金賞給團黨那些團党見端王剛毅爲人可以欺弄一發殘殺搶掠反到端王府裏報捷端王不惟不責反爲嘉獎弄得團黨無法無天更稱什麽大師兄呢大仙姑呢二郎神呢也道是玉皇大帝命他下凡扶清滅洋更道服了靈符焚了黃表就刀劍不能傷槍炮不能損一派胡言弄得端王顛顛倒倒信以爲真便令內外各官員都要獎勵團黨因當時正是端王當國凡在仕途中那一個不討端王臉面以求早日升官果然順端王者或賞或升逆端王者或殺或革凡是有一點官瘤的人千辛萬苦才得了一官半職如何不畏端王的威勢故大半都是順著端王京內如在親王載勳鎮國公載瀾大學土剛毅徐桐尚書趙舒翹啓秀侍郎英年徐承惺府尹王培佑何乃瀛京外文武各官如提督董福祥總督裕祿巡撫毓賢後來更有一個李秉衡自從由山東巡撫轉任川督因教案革職後任爲巡閱長江大臣他恨外人甚深的趁著端王排斥故亦自討奮勇人京督兵其餘大小官員附從端王剛毅的也不能勝數餘外縱不肯附從端王惟是雖明知團黨不是亦不敢言他惡處若是不然那團黨就或搶或殺反道他是交通洋人的端王總不根究只是搶殺一次獎勵一次而已那時端王剛毅只道羽翼既多指日可以取得大位又以爲團黨真個是由天下凡來扶清滅洋的也信團黨有飛天遁地的法術指日又可以殺退洋兵因此更爲得意不想團黨用那些邪術只能欺得小兒實在沒半點實際那洋兵究竟是船堅炮利所以先攻破了大沽口提督羅榮光陣亡後又攻破天津及登岸以後所向難禦雖有聶仕成一軍可能一戰但寡不敵衆況疲戰之際實難支撐得幾時且團黨因毀拆鐵路時被聶軍攻擊故團党亦恨聶仕成如眼中釘刺是以聶仕成當與洋兵開仗時反被團黨在後路攻擊遂至腹背受敵竟至被傷殞命而去自聶仕成亡後更無一人是洋兵對手那董福祥雖口出大言但在京中圍攻使館四十多天連一間使館也不能攻進去可知不是個戰將至於李秉衡亦只是個紙上談兵的實沒一些韜略因屢戰屢敗已經自盡若是直督裕祿早先已歿去了那團黨固不能敵得洋人只會殺本國的官吏而已所以洋人聯合八國大軍勢如破竹沿天津而進自聶仕成歿後既無敵手直攻破了北京那時北京政界中人凡從前趨附端王的或逃或殺也不消說惟這場大禍累及朝廷洋兵既已人城料必至玉石俱焚況各國中如德國憤恨欽差被殺如日本憤恨書記被戕總不免殺人雪恨更怕連太后與皇帝都不能了事因外人雖知這場禍是端王剛毅惹來惟那裏分得許多眼見是朝廷袒團排外殺戮洋人如何恕得因此太后也慮不能倖免便與當時皇帝商量離了北京直望西方而遁又以直隸與京城也是緊要地方只命些親信大臣留守京城又複命榮祿再任直隸總督隨後也除了講和一策更無辦法了果然太后與皇帝出奔之後各國即統軍入到北京太后奔到西省只得令爵相李鴻章與各國議和卒要賠了幾百兆又將縱團排外爲首的大臣盡法懲辦了方肯訂立和約遂把端王廢爲庶人莊王及剛毅趙舒翹勒令自盡瀾公亦革職謫貶除徐桐已故之外如啓秀王培佑何乃瀛及徐承惺與巡撫毓賢也一概治罪這都是後話不提且說和議既定次年太后及皇帝方始回鑾既將禍首大臣治罪自然將有功之人獎敘想以當時各省督撫全憑得東南互保故得免外人分攻各省論功以劉坤一張之洞爲首就各賞了一個宮保銜又想袁世凱一任山東巡撫即力行主剿團党又力陳團黨不足恃且首倡致電各省不遵僞命若當時政府裏頭聽袁世凱之言斷不致有今日之禍便將袁世凱從優獎敘自此朝廷也信任袁世凱亦無人敢爲袁世凱阻力自不消說恰可榮祿複任直隸總督自從端剛被罪或革或殺之後那李鴻章亦於和議後身故只有榮祿一人掌執大權他一來是個貴戚二來又是個相臣所有從前端剛大權都落在他手上他一發信任袁世凱那直隸與山東又是毗連之省有事自然互相酌議無不惟袁世凱之言是聽袁世凱又最能利用權貴因亦深得榮祿之心故更令袁世凱在山東改練新軍自是袁世凱聲望日隆雖是一個巡撫權勢在各疆臣之上有話即長無話即短及到了榮祿沒時遺折竟薦袁世凱一人可繼任北洋總督那時朝廷早看重了袁世凱又得榮祿保薦就升授了直隸總督兼北洋大臣自任了北洋之後又有一番事業正是方爲撫院巡東省又補兼圻鎮北洋要知後事如何且聽下回分解第十二回離東島返國謁疆臣入北洋督衙擒刺客話說袁世凱既得任直隸總督兼北洋大臣這時正值與各國議和之後各國鑒於團黨之亂仍駐軍京津防有再變又將團黨起事地方罰停科舉數年各大臣亦無可如何因京城既破僥倖貽款贖回如何敢與各國相抗故差不多京中政局也操諸外人之手惟各國自此亦方針一變因從前每多提倡要瓜分中國到那時反說保全中國四個字便各出外交手段討好北京政府望與北京政府親厚好爲索取權利起見就中單表俄羅斯一國更爲周到沒一點不向北京政府周旋是以那時京中大員倒道俄國可靠也有發再續聯俄之說的因爵相李鴻章在時亦曾與俄羅斯訂立密約道是清俄聯盟俄人遂乘機把勢力佈滿東三省本來這時看見俄人舉動自應有悔心惟俄人把一片言說稱從前在滿洲布設勢力只是不得已爲對付那一國起見並無他意又說這會欲助中國自強又說要扶中國什麽維新種種甘言弄得北京政府裏頭神魂顛倒大半是信俄羅斯真正可靠的所以自京內至各省都贊成聯俄之說居多更有些提議派大員使俄訂立盟約時俄使在京更天天在總理衙門陳說清俄聯盟之利催促北京政府速派訂議盟約專使自京中傳出消息駐京各使沒一個不知道此事也有電告本國政府的也有運動清俄聯盟解散的鬧成一片因各國正思索取中國權利恐一旦被俄羅斯全數先得了便宜自然不大滿意故各國當時十分注意此事及此點消息傳到北京就引出一個拒俄的義勇隊出來究竟什麽喚做義勇隊呢因當時遊學之風漸盛都知道從前在中國所讀的書無濟於用也轉向外國求專門的實學是以當時在日本留學的已有萬來人個個倒知得列強大勢像俄國是靠不住的都不主張聯俄之議又因當時俄人把勢力佈滿于滿洲大有踞地要求之勢所以北京政府裏頭才發這個聯俄思想實是巴結俄人求他體諒的意思故留東學生無不憤怒就給這個團體喚做義勇隊要來拒俄的不想自義勇隊成立之後竟觸了清國官場所忌因官場裏頭既有多數是贊成聯俄所以連清國駐日本的公使也以拒俄義勇隊爲大大不然又沒有法子解散他就發了個離奇思想分頭打電與北京及南北洋道那些義勇隊只以拒俄爲名實則革命爲實這等語那時北京及南北洋的官場接得駐日公使的電報倒驚慌起來因駐日公使電文中更說那些義勇隊不久派人回國運動起事借拒俄之名好購運軍火故北京政府一發慌張即電致南北洋各督撫認真防察惟東京學生凡入義勇隊的也源源不絕任國內官場說他什麽革命不革命也總置之不理惟趕緊辦事好組織完備一面發電入京主張拒俄看來這個義勇隊若問有什麽效果倒也難說只當時這民氣實在可嘉那日聽得駐日公使電致國內政府有名爲拒俄實圖革命之語並聞國內政府已有電致南北洋防察聽了這點消息就立時開個大會要對付此事大半也主張公舉代表入北洋謁見袁世凱好表明義勇隊的宗旨兼陳聯俄的利害就會中投票公舉以得多數者即爲代表計當時得票多數的第一是劉鐵升其次就是湯榮健都是江浙人因他兩人在留東學生會內是有點名望的且又是發起組織義勇隊的一分子所以就舉他兩人那時劉湯二人見是投票舉了自己也慨然不辭以當時駐日中國公使有電在前說義勇隊是革命黨已有消息由政府知會南北洋各督撫防察又不知袁世凱爲人平日宗旨怎樣故此行是禍是福仍不自知那隊中人數約有二千名沒一個不替劉湯二人憂慮惟劉湯二人一來已被舉不宜推辭以示畏怯並灰冷各人之心二來縱是危險其極至於一死究竟爲國死的也留個芳名因此便寄死生於度外就擇日啓程到出發那一天義勇隊中人又開個大會齊集爲劉湯二人餞送更有許多吟詠詩歌以壯行色也不能細表劉湯二人更登壇演說道是自己此行生死不計總求與會諸君宗旨堅定始終如一勿畏謠言自墮銳氣演說時那一種慷慨激昂之態座中鼓掌聲如雷動無不感激待劉湯二人演說後下壇時都一齊送至河幹揭帽舉手作別然後回去有旁人看著的都道此學生很有點志氣亦爲歎服單說劉湯二人乘輪直望天津而來一路水程無話可表那日到了天津二人先投旅館住下默念此次駐日清使既有電在前說自己是革命黨論起袁世凱的地位正象俗語說官官相衛他只有袒護駐日公使斷沒有幫助自己的道理但此行盡要見他且要速見若在天津逗留過久必被他思疑反疑自己不知運動何事了二人相商意見亦同故甫把行李卸下即懷了名刺直往督署而來時袁世凱亦得有偵探報告說稱劉湯二人已出發來津暗忖他兩人正被人告他是革命黨今忽然敢來相見縱未知他兩人的學問何如但他兩人的膽識已是可敬正要待他來見時看有何議論不想中國官場陋習凡要謁見大員的都要向門上遞送封包方爲引進那劉湯二人如何肯行這賄賂之事亦不懂得這個規例故往見時竟被門上所阻不替他傳進他兩人回來即悟出這個原故立即揮了一函由郵政局遞到直督衙裏函內大意先訴說自己兩人求見不得更力說自己萬里歸來只爲著國家安危大事大人本該效吐哺握發之風急於接見何以堂堂兼析大吏競不除去門閽婪索的積弊實非意料所及這等語又道日前駐日公使報稱我們是黨人若大人信這等言語願就鼎鑊之烹不宜以不見了事種種詞氣反打動袁世凱心坎那袁世凱見了此函反爲感動即戒飭門閽於他兩人來時不要阻他果然劉湯二人次日複往那門上含著一肚子氣與他遞了名刺即傳出一個請字劉湯二人即昂然直進那袁世凱早在廳上等候即迎進廳子裏大家分坐袁世凱先說道兩位在東洋遊學以現在國勢式微人才乏用正望學成歸國好爲國用今兩位不惜荒廢上學時期到來天津究爲著什麽事劉鐵升道學生們雖身在東洋實心懷中國因聽得有聯俄之事故特來請謁不忖揣冒昧有句話要對大人說袁世凱道你們見得聯俄之事其利害究竟如何不妨直說劉鐵升道大凡兩國聯盟總須勢力相敵方能有效今俄強清弱盡人皆知俄人雖極意交歡不過爲籠絡之計好賺取利權我若信之即與聯盟正如引虎自衛學生們正慮及此故組織義勇拒俄隊正爲此意究竟實行聯俄與否請大人明言以釋下懷他日鄙人回東亦好對同學細說免各人懷慮袁世凱聽了略爲點首湯榮健又道一強一弱既不能聯盟況虎狼之俄尤爲難靠鄙人去國萬里不知真耗乍聞風聲由憂致懼故任何等謠言欲陷鄙人亦不惜冒險來謁大人倘有聯俄之事望大人奏阻以免危亡實爲萬幸袁世凱道你們的義勇隊究竟預備作什麽用法呢劉鐵升道學生早經說過了此次俄人強在東三省地方分布勢力以挾索利權倘不得已或致清俄決裂我們義勇隊即回國願爲前驅除此之外義勇隊更無別意袁世凱道很好你們讀書外洋還不忘中國實令人欽敬惟聯俄之事不過官界裏頭曾有人說及斯議實則政府並無此意且自問可以與人聯盟與否難道不知故敢決聯俄一說必無實事你們可以放心至於俄人無理目下只須平和以求轉圜中國處大敗之後亦不容易與人宣戰你們遊學外洋既知關心祖國自應奮力前途學業有成好歸救國故吾敢勸一言因諸位此次在外組織義勇隊的舉動最爲官場所不喜歡且謂諸位名爲拒俄實圖革命是兩位此來亦甚危險本部堂縱能體諒兩位終不能掩別人之口今本部堂已經說明國家斷無聯俄之事是兩位盡可放心望兩位速返東洋將本部堂苦衷向義勇隊內諸人解釋就將義勇隊速行解散此後惟盡力于求學他日卒業歸來國家倚賴不淺望兩位思之劉湯二人聽罷覺袁世凱此言實一片苦心似不可過違其意劉鐵升說道鄙人等組織義勇隊原爲拒俄而起既無拒俄之事定當解散不勞大人費心湯榮健道大人洞明列強大勢聯俄之議料不主行惟北京政府裏頭只怕欲圖苟安以聯俄爲可靠恐此議終未寢息請大人具奏陳明利害力圖自強勿以與強國聯盟爲可靠實國家萬幸袁世凱聽罷點頭稱是劉湯二人即欲興辭袁世凱又留談一會並設宴款待劉湯二人時劉湯二人見袁世凱如此相待不勝感激劉鐵升更自忖道此次回國因駐日公使報稱自己是革命方以此行爲一分危險今袁世凱如此實出意料之外但他日返回東洋有什麽憑據可以令人見信是見過袁世凱呢想了一想卻生一計道鄙人此來得大人剖心相告又令回東後解散義勇隊鄙人無不遵命惟何以得東洋諸人見信恐反謂鄙人等回國一行即變了初心在鄙人被疑不足惜恐于解散一層反生阻力是辜負今日大人的盛意了故敢請大人發給一函給鄙人攜返東洋好勸同人解散因苟得大人一封書一來見得鄙人等確實見過大人二來國家並非聯俄此言確爲大人所說的見不是鄙人等說謊較易令同人見信不知大人以爲然否袁世凱聽到這裏已知劉鐵升用意但發一封書勸解出洋學生亦未嘗不可因此滿口應承劉鐵升及湯榮健二人好不歡喜少頃置酒人席袁世凱居然以客禮相待讓劉湯二人坐客位二人正謙讓不已後見袁世凱出於至誠又被強不過只得就座袁世凱即坐了主位隨舉杯相勸席間談論時務因那時袁世凱正在增練北洋陸軍洋操隊軀劉鐵升湯榮健都是個留日武備學生不久卒業的也向他兩人詢問東洋軍政他兩人一問一答口若懸河袁世凱甚爲敬服卻道中國人才缺乏正在需人而用且自經過甲午庚子兩場戰禍一切軍隊遇著洋兵即望風而潰今兩位有此學問他日學成卒業學問必更爲超卓將來治軍實是國家之幸劉湯二人齊道鄙人只初習皮毛不過既辱明問聊以塞責不圖大人過獎至此實在慚愧慚愧袁世凱道不是這樣說你看鄙人僅練三兩鎮陸軍尚須聘請外人來做顧問若中國早見過外人軍法的像兩位學得專門何至惜才異地今見兩位高論更信專門實學是緊要的若是不然像從前在弓刀石頭裏挑取將官或是因軍保舉營插個名字得點門徑做到提鎮就出來帶兵也說是什麽宿將怪不得甲午年間一見陣戰總不是外人敵手呢故本部堂並不是過獎兩位還望兩位不要自棄須勉力前程才好二人聽了更爲感激又向袁世凱詢問北洋現在練兵的情形整整談到夜色迷檬方才別去行時袁世凱又囑劉湯兩人明日再來二人唯唯應諾次日即不敢不往不想袁世凱早已等候先喚了一個新軍營中的統領到來令帶劉湯二人往看北洋的新軍並說道有什麽不完全叫他兩人指示他兩人益發謙讓不敢當果然隨了那統兵官前去把北洋新軍看了一會然後回轉督衙裏袁世凱再與談論陸軍一會而別次日劉湯二人即辭返東洋而去因自駐日公使報稱義勇隊全是革命黨的作用偏是義勇隊舉了代表人回國那袁世凱不特不加罪他還與他一力周旋以殊禮相待倒見得詫異於是有疑袁世凱立心不軌的有疑袁世凱懷了異心故先收物望的不一而足第一那些宗室中人一來見袁世凱兵權在手已自不妥二來又見這會舉動明明報稱是革命黨的人反與之來往更沒有不思疑的袁世凱也統置諸不理惟極力反對聯俄一說而已且說劉鐵升湯榮健二人回到東洋那時義勇隊中人已先後接劉湯二人的報告知道見了袁世凱又知道他搭那一號輪船回來故俟輪船到東之日即邀齊同人假座酒樓開個歡迎大會即派多人到碼頭相接一直迎到酒摟裏大家出來握手爲禮一則以謠言盛興之日方稱自己同人是革党劉湯二人毅然前往已屬可敬又幸得劉湯二人平安回來自然歡喜故劉湯二人到座時即一齊鼓掌聲如雷動隨請劉湯二人將回國所辦的事項登壇布告與同人知道然後次第演說都是解釋袁世凱所稱並無聯俄之事而已自此義勇隊雖不十分解散然不像從前憤激後來聯俄的風聲亦漸寢息其故不盡關於袁世凱不贊成因聯俄之議是王之春提倡最力的那王之春是曾經使俄的人他在廣東藩司任內時俄皇尚爲太子來遊時曾與王之春款洽故王之春一力主張聯俄以爲可靠奈國民中沒有一個贊成反恨王之春入骨就有一班人組織做暗殺黨要把議聯俄的人盡數以暗殺對待那時就有不分皂白以爲王之春提倡此議其餘北京政府及北洋大臣都主張實行此議的便分頭去幹暗殺之事所以王之春在上海金穀園酒樓就有被萬福華行刺不成的事後來把萬福華審訊在租界監禁了十年惟此時自王之春遇了這一場事就沒一個複敢提說聯俄的話這都是後話不必細表單說當時那班做暗殺的也不止要謀王之春一人因爲紛傳袁世凱亦是主張聯俄的人就有一人喚做賈炳仁的擔任謀刺袁世凱的事因當日俄國虛無黨之風最盛自此風流入中國凡是尚遊俠輕性命的都樂於此道以爲暗殺之舉一來可以警惕專制的權臣二來可以博自己的名譽那萬福華賈炳仁就是這一輩那日賈炳仁取道直往北洋滿意一到成功不負此一走不想事未幹出竟在督署上房被衙役窺出破綻就不幸失手也被拿去了正是欲圖暗殺輕身去轉被疏虞失手歸要知後事如何且聽下回分解第十三回縱刺客贈款南歸對強鄰觀兵中立話說賈炳仁既擔任前往行刺袁世凱因什麽事未幹得來就要失手呢卻爲賈炳仁平日只是憑著一點憤烈之心只願把性命相搏至於如何方能刺得袁世凱卻不曾計算且直隸總督衙署森嚴賈炳仁本不曾進去過的如何能近得袁世凱所以擔任此事時雖一團熱心及到中途頗覺有點難下手之處因此忖道如事做不來就犧牲了這條性命實在可惜若是到此時便反悔了實惹天下人恥笑這樣就不是大丈夫所爲想到這裏即無退志便鼓起餘勇直望天津而來因直督衙門卻有兩處半年駐於保定就有半年駐於天津那時直督恰可駐在天津地方故賈炳仁到時先在天津揀一間旅館住下心中正計算如何方刺得袁世凱滿意待他出衙時迎面用手槍擊他想自己是曾經練過手槍的準頭命中頗信得過且除了槍擊就沒第二個法子能近他身邊的了正想象間忽聞金鑼震動呼喝之聲灌徹耳朵裏正問店中小廝是什麽事那小廝道並沒別事不過北洋大臣往租界拜會領事府今欲回衙經行此地的賈炳仁聽了就起身向窗外張望早見那一頂八擡大轎子已經過去了心中卻道可惜可惜又忖道自己若早到一天打聽得他往租界會客今天就可幹自己的事今他過時方知道是他經過一點事也沒有預備亦沒分毫佈置卻行刺不得今失此機會又複待下次了嗟歎了一會一宿無話次日即出外遊行欲打聽袁世凱再於何時有事出衙不想兩三天總沒消息心上已不勝懊惱那一無清早起來旅店裏早有紅單派到直督袁世凱因感冒告假一月不理事賈炳仁看了心中頓吃一驚因自己所要幹的事實不能告人若在天津居住過久必要動人思疑今直督又告假一個月想這一個月內袁世凱必然不出衙門怎能行刺得他若再過一個月盤川固然用盡且恐誤了事如何是好左思右想計不如謀進督署好親自刺他還好想罷便拿定了這個主意原來賈炳仁卻有一宗絕技凡文人志士罕能做到的卻是飛檐走壁上高落低頗爲矯健故決意先進督衙踏看地方到次夜即行下手且刺人者用刀較用槍還有把握所以賈炳仁就轉這個念頭早拿定主意那日等到晚飯後折到督衙左右往往來來審視了一會只見督衙後壁緊貼一間民房卻是營小販的時已入夜各家都已閉了門戶是夜又值一月將盡月色無光更有微雨路上行人絕少賈炳仁便欲縱步跳上那間民房然後轉登督署忽見一個更夫擊拆前來賈炳仁恐爲所見卻閃過一旁讓更夫去遠後走回那間民房附近見側邊有一條石基就踏上石基之上翻身一縱已登上瓦面不想爲時尚未夜深那間民房內裏那些人還未睡著聽得瓦面響動早已大聲呼喚賈炳仁恐驚動別人先鬧出事就不動聲息急折上督署後牆卻沿牆而進已到督署上房瓦面從窗口向下面一張覺外面隔一道天階直出就是簽押房惟天階上面統用鐵枝遮繞頗難以下去但見上房內有兒個婦女還圍在一張桌子上打麻將旁邊立著幾個丫環遞煙那時國有微雨上房內無人出進賈炳仁卻伏在瓦上蛇行直過前座瓦面再向下張望正是簽押房地方只見袁世凱在燈下閱看文卷旁邊立著一個跟人賈炳仁看得清楚覺此時下手最好但各處天階俱用鐵枝支搭以外就有門戶俱已緊閉反覺無從下手心中自恨失此機會計不如明晚再來帶些鏹水把鐵枝弄折了直下去取他一命實在不難想罷便想仍沿舊路回至那間民房瓦面上然後轉下來已是二更有餘還虧沒人知覺回寓後只托稱遊行街上才回過了一夜次日即購買鏹水預備晚間所用惟望這一夜天仍有雨好便於幹事而已不提防自前一夜賈炳仁縱上那間民房之時已驚動內裏的人次早即探著瓦面覺牆上尚有些腳印況跳上之時用力不免過猛已把幾塊瓦踏破了看過腳迹直望督衙而去心中益發詫異少不免把此事對鄰人及親朋訴說恰督衙那位伙夫到來都是平日會談慣的就對他說及此事那位伙夫記在心裏卻回衙中將這一件事情報告就由督署巡捕踏勘了一回忖度此人登督衙瓦面究有什麽用意料他次夜一定再來即密囑手下各人分頭伏在瓦面上窺探賈炳仁卻不知道已經泄漏了事情只等到夜分依舊前往是夜路徑較熟直踩到簽押房瓦面上不想早被巡捕各人見著卻把暗號傳告手下即一齊動手你道賈炳仁一個人如何走得脫即被衙役拿下急搜身上並無一物原來賈炳仁見衙役來捕時已把鏹水及小刀概行丟掉去了只道衙役搜不出凶器也不敢致有什麽大罪忽聞一人呼道這裏遺下有一把刀於呢賈炳仁聽了即知道被他們搜出利刃自己所謀的事料不能不認當下即由差役押賈炳仁下來那些巡捕已當這件功勞料然不少小乘夜報知袁世凱報道是拿了刺客了袁世凱聽得想了想即令巡捕官獨自進來問個備細那巡捕官便把先一夜看出形迹是夜派人偵察當場拿獲便拾得利刃一柄從頭到尾訴說一遍袁世凱道既是如此倒是你們小心可嘉但此事總要秘密不宜傳出外人去外人言三語四弄得城中不安靜怕那時更有宵小之徒乘機教做謠言不免居民皇皇反爲不美你且退下不要張揚便是別人問起只說沒有這等事罷了巡捕官說一聲卑職知道了即退出來袁世凱令帶賈炳仁進來令將他身上搜過並無兇器即令各人退出獨自訊問那賈炳仁時賈炳仁自忖被拿後必不能免於一死因是當場捉獲更搜得兇器的還有什麽可說只得立實主意直供不諱因此到時立而不跪袁世凱亦不強他跪下那袁世凱道你獨自一人身懷利刃到本衙瓦面上要幹什麽事賈炳仁笑道自然是要來刺殺你的又何必多問袁世凱聽了登時面色一變卻道你好大個膽子你既謀刺我這罪案非同小可你還敢直說出來麽賈炳仁笑道好大個人物還說這些話原來不值我一刺的須知謀刺你的事我有膽子要幹得來難道沒有膽子說得出若說句話還不敢尚講什麽實行呢袁世凱此時覺此人好生奇異便問道你究是姓甚名誰的賈炳仁道我是姓賈的名喚炳仁今既被拿欲殺便殺還端詳名字做什麽袁世凱道父母生你本望你有點成立的你要幹這些事難道不畏死的賈炳仁又笑道我畏死便不來了袁世凱道你同黨有若干人呢賈炳仁道總不能說得許多只各幹各事罷了袁世凱道現在來謀我的又有幾人呢賈炳仁道一人制一人那消許多只我一人到來要幹此事今我既不幸被擒只合殺我一人不要株連別個致爲我一人累及無辜袁世凱道你還有點仁慈的心但我有什麽不是卻要來殺我賈炳仁道方今公理漸明若那些只圖高官厚祿擁護一姓專制的君權不謀國民平等的權不還國民自由的福是專制的民賊我們便要殺他袁世凱道這樣內而北京外而各省凡在仕途中的倒都要刺殺了試問你們又那裏刺得許多賈炳仁道愈執大權的愈要先謀殺他大人官鎮北洋握幾鎮兵權若是念及國民那一事幹不得你還只是隨衆浮沈怕中國裏頭要殺大人的不止我一人了況新近發現一點事大人的宗旨必要誤國害民大人想還記得袁世凱聽到這裏反驚詫起來口呆目定好半晌方問道本部堂什麽誤國害民新近發現的又是什麽事呢賈炳仁道大人真個不知麽現在政府裏頭主張聯俄那個不知道是王之春提倡你來贊成的大人試想俄羅斯是什麽國既分割了波蘭又欲分割土耳其近來蠶食蒙古虎視滿洲狼子野心還要與他聯盟正如引虎自衛故先要謀刺王子春與你兩人好絕後患袁世凱聽了笑道你不知東京拒俄義勇隊曾舉代表來見我麽我那有主張聯俄這等下策我初只道你是有點見地的人不想道路傳言就信爲真致自輕身命冒險來幹這等事說罷反大笑不已賈炳仁看了也感觸起來暗忖袁世凱這人好生奇異若別人做到總督地位那個不小題大做要殺人示威今自己要殺他又是當場捉獲的若在別人無有不把極刑來處治自己的道理他偏有一番說話與自己面談我要殺他的他不以爲仇反如此謙虛實在難得料他必有個深意看來又不免要誤殺他了想罷即道大人既不是主張聯俄是我的錯疑了但錯疑了聯俄的人也沒有錯罵那專制的民賊我這點心卻不易解的說罷複仰天哦道炸藥轟開新世界狂瀾倒盡逆潮流此生羞讀支那史有幾男兒識國憂袁世凱聽到這裏也不免感觸細看那賈炳仁不過是二十來歲的人卻肯如此冒險料他都是革党中人要學俄羅斯的虛無黨來做暗殺的無疑了細想他又像劉鐵升湯榮健之流有點志氣亦有點膽量的倒又可敬就真誠說道本部堂說不是贊成聯俄的你有懷疑沒有呢賈炳仁道這都難說因我平生將己比人向不好說謊就向不疑人有說謊的且我不曾把假話說來若大人做這個地位還說假話就出人意外了袁世凱道本部堂今把你省釋回去你卻怎樣賈炳仁又笑道這更是笑話大人方問我同謀這件事的有若干人還怕要株連黨獄是真我卻是當場捉獲的大人如何肯放我今我再實說這件事只是我一人幹的不要再起株連只望大人不加嚴刑責供同黨令我認供便是萬幸若說縱我回去如何敢作此夢想袁世凱道本部堂若要株連時早把你發具嚴訊了你明明說各幹各事謀刺專制民賊可知你黨中不止你一人但今不必多說本部堂實借你的愚莽又怕你的兇狠只還敬你的膽志今實在說本部堂要捎捎釋你回去不要把此事張揚出來但你被釋後要作如何舉動不妨實告賈炳仁這時覺袁世凱此話真是開誠佈公料他真別有深意這樣如何好負他因此直說道我被拿時本不望有再生之日惟若得邀大人高量憚得重生這點私恩卻不能不念惟我宗旨不能改變只自悔學問未優作事不密既已被捕又靠省釋於人此後惟有埋名隱姓老守田園不復問天下事罷了若感私情而變初心慕勢利而受驅策是某所不能爲也袁世凱道古人說得好道是三軍可奪帥匹夫不可奪志又道是士各有志不能相強足下此言實如披肝瀝膽令人敬佩但足下言不願受人驅策難道本部堂除了足下就沒人使任不成總而言之本部堂之意務欲成全足下萬勿以他意生疑才好賈炳仁道大人之言亦是實話惟欲成全於我敢問大人所以成全之道莫不是聽某一言有感於心故改念爲國民造福以成某之志乎抑以某此來甘蹈白刃爲聶政荊卿之所爲今已被擒故欲先殺吾首使吾如荊卿一般傳之後世因以成名乎若是不然有何成全之法務請大人明示袁世凱笑道足下所言皆非也本部堂所處地位不能行足下之志故目下與足下宗旨不同若謂必殺足下然後足下成名又萬元此成全之法昔張良矢志與韓報仇終輕舉妄動而無濟於事本部堂雖不能比得秦皇惟足下究與昔日張良相仿佛故所謂成全足下者亦如黃石公之成全張良而已本部堂雖無張良之才但足下既懷救