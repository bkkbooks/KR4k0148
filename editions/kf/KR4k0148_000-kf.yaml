那娘兒回告媛媛那媛媛道嫁得一堂堂方面大員所得亦不過日餐夜宿若嫁了個平常土商未必便餓死去妾何辜以至於此還怕珠沈玉碎終無人知覺亦將何用說罷又複長籲短歎咯出血來娘兒慰藉了一番終不能釋是夜竟以咯血不止面白唇張奄奄一息捱至五更時分一命嗚呼敢是死了那娘兒到此時追念數年追隨不覺感動大爲拗哭不得已亦報知太太適袁入京未返太太念人只一死亦欲從厚營葬惟諸姨太太無不恨他交相讒阻只草草經理葬具即逐娘兒出署那娘兒憤極欲尋楊忠告訴奈楊忠已隨赴山東無可如何只得略典衣物自治行裝回上海而去時袁世凱雖然在京惟任上各政及署中各事仍不時著人隨時報告那日聽得媛媛已經死去心上不勝悲梗欲援筆自作悼亡詩忽門子報稱慶王邀往相見有事商議袁世凱便不敢延誤即穿衣冠望慶邪而來適慶王子先在座見袁世凱有些戚容便問有何事故袁世凱答道弟對兄本無不可言自蒙王爺拔擺升任北洋披理公牘日無暇曼公餘之暇只有金姬聲色略解煩惱今不幸物化故不免戚戚休要見笑慶王於道金姬從那裏得來想必是天人若是不然足下斷不至如此眷戀袁世凱道是個南妓以數千金得之最解人意不特色可羞花抑且聲能戛玉是以不勝憶念弟並更一言恐不止弟後房未有其比實北妓中所未有也慶王於道近來南妓身價漸高若像足下所言是名稱其實惜弟生長北方所見南妓無幾未得一廣眼界袁世凱道蘇杭地方女色爲國中著名足下欲得固亦不難正說著慶王已出忙起行禮慶王道彼此知己何必頻頻講禮慶王子插口道袁兄今遇一不幸事後房喪一絕色佳人故心上不大舒服慶王笑向袁世凱道然則足下亦是情種袁世凱道自古英雄無不多情說著大家一笑袁世凱又道不知王爺相召有何賜教慶王道明天在政務處會議新政因日前足下在任上奏陳組織立憲應辦事件力主先建內閣明天會議就爲此事想軍機諸王大臣皆到足下須依期早到袁世凱道王爺料此事可能辦到否慶王道這卻不能預料想其中必有反對的因今巳辦事之難固在意中也袁世凱道若不重新組織內閣何得謂之立憲門下必以死力相爭慶王答聲是袁世凱便辭退時袁世凱權勢方盛京中已不知幾人覰他的行動自從到京後一切舉動倒被人偵探就中最留意的就是鐵良那日聽得袁世凱過慶王府相談不知議論何事便即穿衣來見袁世凱那袁世凱早知鐵良不是自己的同氣但終想交歡他以求和洽便接進裏面鐵良明知袁世凱主張建設內閣便故意說道方今國勢日弱若不能改革政體實不可爲國但盈廷聚訟左一人發一議即有右一人出來反對凡事難辦實在可歎袁世凱聽得深以此言爲是並不疑鐵良有詐因此答道足下此言正與今日慶王爺說的相同可謂洞中今日時局的肺腑鐵良聽得此話就知慶王是贊成組織內閣的鐵良仍故意詐作欷少頃退去心中暗忖道若真個組織內閣必將以慶王爲總理大臣以袁世凱爲副總理大臣是政權更在袁世凱手上實不可不防便急往見醇王載灃因知醇王是當時皇帝的胞弟除了他更沒別人可與慶王相抗正要借醇王之力來阻止內閣故相見時慌忙說道王爺知國家變故否呢醇王聽得大驚道有什麽變故某實不知鐵良道慶王總不懂事任袁某人播弄借立憲之名要建設內閣自然先要解散軍機王爺試想軍機裏頭歷來都是我們宗室人總執大權的若一旦解散而建設內閣雖以慶王仍任總理大臣但任那副大臣的一定是袁世凱那慶王不過袁某的傀儡是不啻袁某爲總理大臣了且弟聞內閣一設凡宗室人不能以親見任他並雲滿人皆紈袴子弟不懂國計內閣裏頭不能輕易委任滿人顯然要攬權專政弟觀操莽之事頗爲寒心今袁某總綰北洋管鑰又兼數鎮兵權若要反動不過彈指間事且聞袁某向與革黨周旋事雖傳聞究不可不慮醇王聽罷不禁悚然便問將如何處此鐵良道弟聞明日在政務處會議此事望王爺屆期必到務要力爭我國存亡在此一舉王爺不可忽略醇王聽罷點頭稱是並道你且退去我已有主意某在一日斷不能使彼得志也鐵良稱謝而去醇王此時氣忿忿深恨袁世凱過了一夜次日醇王即令左右備下一柄六門短槍家人總不知醇王意但見他餘怒未息又不敢問左右只得呈上一口短槍出來醇王接了一言不發即藏在身裏傳令備轎左右更不敢抗立令轎班掌轎醇王便令跟人隨著乘了轎子直望政務處來到時已見有數人在座都是四相六部及軍機中人大家向醇王見過禮然後坐下好半晌才見慶王袁世凱一齊到來醇王見袁某此時方至已滿心不悅大家見禮分坐後少不免作一會寒暄話各人見醇王面色不好知道有些原故不多時把建設內閣一事提出慶王先請各人發議往時凡議一事凡與議的大臣都揀最遲的時候方到到後只模棱一會即會飲而散那日各人到的獨早因有贊成的預定發言有反對的又預定辯駁故提此議時袁世凱即發議道方今朝廷有鑒于世界大勢苟非立憲不足以息內亂而圖自強故首令籌立基礎弟以爲欲行立憲先建內閣爲本然後分建上下議院君主端拱于上即不勞而治弟以爲此乃萬年不朽之基望各位認真研究此事若成國家幸福不淺袁某說了當日慶王子方任商部尚書時亦在座即繼說道袁公之言甚爲有理弟曾到過外國見他政治井然皆由責任內閣設立議院所致君主固可端拱望成國家亦可久安長治願諸公贊成袁某之言當下慶王袁某聽得慶王子所說都點頭微笑袁世凱又道畢竟見過世面的見識不同今王子所發議論實宗室中錚錚皎皎那時各人都不發一語單是醇王怒不能忍先向慶王子道方才作